<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>дәҢеҚҒеӣӣж„ҝ В· жңҖзңҹзҡ„зҘқзҰҸ</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121826;
      --text: #e6edf3;
      --muted: #9aa4b2;
      --border: rgba(255,255,255,0.10);
      --btn: #1f6feb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: var(--bg);
      color: var(--text);
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 12px 0;
    }
    .page-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 4px;
    }

    .tab-bar {
      display: flex;
      margin: 14px auto 0;
      max-width: 480px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
    }
    .tab-item {
      flex: 1;
      text-align: center;
      padding: 9px 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      border-radius: 9px;
      cursor: pointer;
      transition: background .15s, color .15s;
      user-select: none;
    }
    .tab-item.active {
      background: var(--btn);
      color: #fff;
    }

    .sub-bar {
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 10px auto 0;
      max-width: 480px;
      padding: 0 12px;
    }
    .sub-bar.show { display: flex; }
    .sub-item {
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      user-select: none;
    }
    .sub-item.active {
      background: var(--btn);
      color: #fff;
      border-color: var(--btn);
    }

    .picker-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 20px;
    }

    .tile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
      max-width: 480px;
    }
    .tile {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      text-decoration: none;
      color: inherit;
    }
    .tile:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    .tile:active {
      transform: scale(0.97);
    }
    .tile img {
      width: 100%;
      display: block;
      aspect-ratio: 270 / 400;
      object-fit: cover;
    }
    .tile-label {
      text-align: center;
      padding: 8px 6px;
      font-size: 13px;
      color: var(--muted);
    }

    /* и®ҫеӨҮдҝЎжҒҜеҚЎзүҮ */
    .device-info {
      max-width: 480px;
      margin: 14px auto 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      color: var(--muted);
      display: none;
    }
    .device-info.show { display: block; }
    .device-info-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      text-align: center;
    }
    .device-info-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 12px;
      align-items: baseline;
    }
    .di-label {
      white-space: nowrap;
      color: var(--muted);
    }
    .di-value {
      color: var(--text);
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <span class="page-title">дәҢеҚҒеӣӣж„ҝ В· жңҖзңҹзҡ„зҘқзҰҸ</span>
  </div>
  <div class="tab-bar" id="tabBar">
    <div class="tab-item" data-tab="graphic">еӣҫж–Үзұ»</div>
    <div class="tab-item" data-tab="photo">еӣҫеғҸзұ»</div>
  </div>
  <div class="sub-bar" id="subBar"></div>
  <div class="device-info" id="deviceInfo"></div>

  <div class="picker-main">
    <div class="tile-grid" id="tileGrid"></div>
  </div>

  <script>
    const grid = document.getElementById('tileGrid');
    const tabBar = document.getElementById('tabBar');
    const subBar = document.getElementById('subBar');
    const tabs = tabBar.querySelectorAll('.tab-item');
    const search = window.location.search || '';

    // и§Јжһҗи®ҫеӨҮеҸӮж•°пјҲ4дҪҚжңҲе№ҙ + 9дҪҚmac_b62 + 8дҪҚkeyпјү
    const deviceMatch = (search + (window.location.hash || '')).match(/(\d{4})([A-Za-z0-9]{9})([A-Za-z0-9]{8})/);
    const deviceMonth = deviceMatch ? deviceMatch[1] : '';
    const deviceMac   = deviceMatch ? deviceMatch[2] : '';
    const deviceKey   = deviceMatch ? deviceMatch[3] : '';

    let allTemplates = [];
    let allTypes = [];       // [{id, name}]
    let activeTab = null;    // 'graphic' | 'photo' | null
    let activeTypeId = null; // number | null
    let deviceInfoData = null; // и®ҫеӨҮдҝЎжҒҜпјҢзј–з ҒеҗҺдј йҖ’з»ҷ apply йЎөйқў

    // еҲӨж–ӯжЁЎжқҝеұһдәҺе“ӘдёӘеӨ§зұ»
    function tplTab(tpl) {
      return tpl.kind === 'photo' ? 'photo' : 'graphic';
    }

    // жёІжҹ“з“·зүҮеҲ—иЎЁ
    function renderGrid(list) {
      grid.innerHTML = '';
      list.forEach(tpl => {
        const a = document.createElement('a');
        a.className = 'tile';
        const params = new URLSearchParams({ template_id: tpl.id, bg: tpl.bg, top: tpl.top });
        const applyPage = tpl.kind === 'photo' ? 'dl/template/pic_apply.html'
                        : tpl.kind === 'custom' ? 'dl/template/custom_apply.html'
                        : 'dl/template/apply.html';
        const devInfoParam = deviceInfoData ? '&devinfo=' + encodeURIComponent(JSON.stringify(deviceInfoData)) : '';
        a.href = applyPage + '?' + params.toString() + devInfoParam + (search ? '&' + search.slice(1) : '');
        const img = document.createElement('img');
        img.src = tpl.thumb ? ('dl/' + tpl.thumb) : '';
        img.alt = tpl.name;
        img.onerror = function() { this.style.display = 'none'; };
        const label = document.createElement('div');
        label.className = 'tile-label';
        label.textContent = tpl.name;
        a.appendChild(img);
        a.appendChild(label);
        grid.appendChild(a);
      });
    }

    // иҝҮж»Өе№¶жёІжҹ“
    function applyFilter() {
      let filtered = allTemplates;
      if (activeTab) {
        filtered = filtered.filter(t => tplTab(t) === activeTab);
      }
      if (activeTypeId !== null) {
        filtered = filtered.filter(t => t.type_id === activeTypeId);
      }
      renderGrid(filtered);
    }

    // жёІжҹ“еӯҗеҲҶзұ»жҢүй’®пјҲеҸӘжҳҫзӨәеҪ“еүҚеӨ§зұ»дёӢе®һйҷ…жңүжЁЎжқҝзҡ„еҲҶзұ»пјү
    function renderSubBar() {
      subBar.innerHTML = '';
      if (!activeTab) {
        subBar.classList.remove('show');
        return;
      }
      // жүҫеҮәеҪ“еүҚеӨ§зұ»дёӢжүҖжңүжЁЎжқҝзҡ„ type_id йӣҶеҗҲ
      const tabTemplates = allTemplates.filter(t => tplTab(t) === activeTab);
      const usedTypeIds = new Set(tabTemplates.map(t => t.type_id));
      const visibleTypes = allTypes.filter(tp => usedTypeIds.has(tp.id));
      if (visibleTypes.length === 0) {
        subBar.classList.remove('show');
        return;
      }
      visibleTypes.forEach(tp => {
        const btn = document.createElement('div');
        btn.className = 'sub-item';
        btn.textContent = tp.name;
        btn.dataset.typeId = tp.id;
        btn.addEventListener('click', () => {
          if (activeTypeId === tp.id) {
            // еҶҚж¬ЎзӮ№еҮ»еҸ–ж¶ҲйҖүдёӯ
            activeTypeId = null;
            subBar.querySelectorAll('.sub-item').forEach(b => b.classList.remove('active'));
          } else {
            activeTypeId = tp.id;
            subBar.querySelectorAll('.sub-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
          }
          applyFilter();
        });
        subBar.appendChild(btn);
      });
      subBar.classList.add('show');
    }

    // Tab зӮ№еҮ»
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const clicked = tab.dataset.tab;
        if (activeTab === clicked) {
          // еҶҚж¬ЎзӮ№еҮ»еҸ–ж¶ҲйҖүдёӯ
          activeTab = null;
          tabs.forEach(t => t.classList.remove('active'));
        } else {
          activeTab = clicked;
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
        }
        activeTypeId = null;
        renderSubBar();
        applyFilter();
      });
    });

    // еҲҶй’ҹж•° вҶ’ HH:MM
    function minsToTime(m) {
      m = parseInt(m) || 0;
      if (m < 0 || m > 1439) m = 0;
      const h = Math.floor(m / 60), mm = m % 60;
      return (h < 10 ? '0' : '') + h + ':' + (mm < 10 ? '0' : '') + mm;
    }

    // жёІжҹ“и®ҫеӨҮдҝЎжҒҜ
    function renderDeviceInfo(dev) {
      const el = document.getElementById('deviceInfo');
      if (!dev) { el.classList.remove('show'); return; }

      const regDate = dev.registered_at ? new Date(dev.registered_at * 1000).toLocaleDateString('zh-CN') : '-';
      const lastReq = dev.getlist_at ? new Date(dev.getlist_at * 1000).toLocaleString('zh-CN') : '-';
      const cellAt  = dev.cell_at ? new Date(dev.cell_at * 1000).toLocaleString('zh-CN') : '';

      const rows = [
        ['жіЁеҶҢж—¶й—ҙ', regDate],
        ['иҜ·жұӮж¬Ўж•°', String(dev.getlist_count || 0)],
        ['зҘқзҰҸж•°йҮҸ', String(dev.blessing_count || 0)],
        ['жңҖеҗҺиҜ·жұӮ', lastReq],
      ];
      if (dev.cell) {
        rows.push(['еҹәз«ҷдҝЎжҒҜ', dev.cell + (cellAt ? '  (' + cellAt + ')' : '')]);
      }
      if (dev.manual_location) {
        rows.push(['жүӢеҠЁдҪҚзҪ®', dev.manual_location]);
      }
      rows.push(['еҲҮжҚўй—ҙйҡ”', 'жӯЈеёё ' + dev.sleep + 'з§’ / дҪҺз”өйҮҸ ' + dev.sleep_low + 'з§’']);
      rows.push(['жӣҙж–°ж—¶еҲ»', minsToTime(dev.attime)]);
      rows.push(['иҝҗиЎҢж—¶ж®ө', minsToTime(dev.time_start) + ' ~ ' + minsToTime(dev.time_end)]);
      rows.push(['йҹійҮҸ', String(dev.volume)]);

      let html = '<div class="device-info-title">и®ҫеӨҮдҝЎжҒҜ</div><div class="device-info-grid">';
      rows.forEach(([label, value]) => {
        html += '<span class="di-label">' + label + '</span><span class="di-value">' + value + '</span>';
      });
      html += '</div>';
      el.innerHTML = html;
      el.classList.add('show');
    }

    // еҲқе§ӢеҢ–пјҡеҗҢж—¶еҠ иҪҪжЁЎжқҝеҲ—иЎЁе’ҢеҲҶзұ»еҲ—иЎЁ
    (async () => {
      try {
        const devParams = deviceMonth ? `&month=${encodeURIComponent(deviceMonth)}&mac=${encodeURIComponent(deviceMac)}&key=${encodeURIComponent(deviceKey)}` : '';
        const [resTemplates, resTypes] = await Promise.all([
          fetch('dl/template.php?action=list' + devParams),
          fetch('dl/template.php?action=list_types' + devParams)
        ]);
        const listData = await resTemplates.json();
        // е…је®№ж–°ж—§ж јејҸпјҡж–°ж јејҸ {templates:[], device:{}} ж—§ж јејҸ []
        allTemplates = Array.isArray(listData) ? listData : (listData.templates || []);
        if (listData.device) deviceInfoData = listData.device;
        const typesData = await resTypes.json();
        allTypes = (typesData.types || []).map(t => ({ id: Number(t.id), name: t.name }));
        // еҲқе§ӢпјҡжҳҫзӨәе…ЁйғЁ
        applyFilter();
      } catch (e) {
        console.warn('еҠ иҪҪжЁЎжқҝж•°жҚ®еӨұиҙҘ:', e);
      }
    })();
  </script>
</body>
</html>
