<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>二十四愿 · 最真的祝福</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121826;
      --text: #e6edf3;
      --muted: #9aa4b2;
      --border: rgba(255,255,255,0.10);
      --btn: #1f6feb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: var(--bg);
      color: var(--text);
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 12px 0;
    }
    .page-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 4px;
    }

    .tab-bar {
      display: flex;
      margin: 14px auto 0;
      max-width: 480px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
    }
    .tab-item {
      flex: 1;
      text-align: center;
      padding: 9px 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      border-radius: 9px;
      cursor: pointer;
      transition: background .15s, color .15s;
      user-select: none;
    }
    .tab-item.active {
      background: var(--btn);
      color: #fff;
    }

    .sub-bar {
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 10px auto 0;
      max-width: 480px;
      padding: 0 12px;
    }
    .sub-bar.show { display: flex; }
    .sub-item {
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      user-select: none;
    }
    .sub-item.active {
      background: var(--btn);
      color: #fff;
      border-color: var(--btn);
    }

    .picker-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 20px;
    }

    .tile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
      max-width: 480px;
    }
    .tile {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      text-decoration: none;
      color: inherit;
    }
    .tile:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    .tile:active {
      transform: scale(0.97);
    }
    .tile img {
      width: 100%;
      display: block;
      aspect-ratio: 270 / 400;
      object-fit: cover;
    }
    .tile-label {
      text-align: center;
      padding: 8px 6px;
      font-size: 13px;
      color: var(--muted);
    }

    /* 设备信息卡片 */
    .device-info {
      max-width: 480px;
      margin: 14px auto 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      color: var(--muted);
      display: none;
    }
    .device-info.show { display: block; }
    .device-info-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      text-align: center;
    }
    .device-info-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 12px;
      align-items: baseline;
    }
    .di-label {
      white-space: nowrap;
      color: var(--muted);
    }
    .di-value {
      color: var(--text);
      word-break: break-all;
    }

    /* 不可关闭全屏遮罩 */
    .block-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
    }
    .block-overlay.show { display: flex; }
    .block-overlay-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 28px;
      max-width: 320px;
      width: 90%;
      text-align: center;
    }
    .block-overlay-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }
    .block-overlay-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }
    .block-overlay-msg {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }
    .block-overlay-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 9px 32px;
      background: var(--btn);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <span class="page-title">二十四愿 · 最真的祝福</span>
  </div>
  <div class="tab-bar" id="tabBar">
    <div class="tab-item" data-tab="graphic">图文类</div>
    <div class="tab-item" data-tab="photo">图像类</div>
  </div>
  <div class="sub-bar" id="subBar"></div>
  <div class="device-info" id="deviceInfo"></div>

  <div class="block-overlay" id="blockOverlay">
    <div class="block-overlay-box">
      <div class="block-overlay-icon">📦</div>
      <div class="block-overlay-title">祈福牌运输库存中</div>
      <div class="block-overlay-msg">您的祈福牌正在运输或备货中，暂时无法使用，请耐心等待。</div>
    </div>
  </div>

  <div class="block-overlay" id="testOverlay">
    <div class="block-overlay-box">
      <div class="block-overlay-icon">🔧</div>
      <div class="block-overlay-title">出厂测试</div>
      <div class="block-overlay-msg">进入挂牌状态将无此提示</div>
      <button class="block-overlay-btn" id="testOverlayOk">确定</button>
    </div>
  </div>

  <div class="picker-main">
    <div class="tile-grid" id="tileGrid"></div>
  </div>

  <script>
    const grid = document.getElementById('tileGrid');
    const tabBar = document.getElementById('tabBar');
    const subBar = document.getElementById('subBar');
    const tabs = tabBar.querySelectorAll('.tab-item');
    const search = window.location.search || '';

    // 解析设备参数（4位月年 + 9位mac_b62 + 8位key）
    const deviceMatch = (search + (window.location.hash || '')).match(/(\d{4})([A-Za-z0-9]{9})([A-Za-z0-9]{8})/);
    const deviceMonth = deviceMatch ? deviceMatch[1] : '';
    const deviceMac   = deviceMatch ? deviceMatch[2] : '';
    const deviceKey   = deviceMatch ? deviceMatch[3] : '';

    let allTemplates = [];
    let allTypes = [];       // [{id, name}]
    let activeTab = null;    // 'graphic' | 'photo' | null
    let activeTypeId = null; // number | null
    let deviceInfoData = null; // 设备信息，编码后传递给 apply 页面

    // 判断模板属于哪个大类
    function tplTab(tpl) {
      return tpl.kind === 'photo' ? 'photo' : 'graphic';
    }

    // 渲染瓷片列表
    function renderGrid(list) {
      grid.innerHTML = '';
      list.forEach(tpl => {
        const a = document.createElement('a');
        a.className = 'tile';
        const params = new URLSearchParams({ template_id: tpl.id, bg: tpl.bg, top: tpl.top });
        const applyPage = tpl.kind === 'photo' ? 'dl/template/pic_apply.html'
                        : tpl.kind === 'custom' ? 'dl/template/custom_apply.html'
                        : 'dl/template/apply.html';
        const devInfoParam = deviceInfoData ? '&devinfo=' + encodeURIComponent(JSON.stringify(deviceInfoData)) : '';
        a.href = applyPage + '?' + params.toString() + devInfoParam + (search ? '&' + search.slice(1) : '');
        const img = document.createElement('img');
        img.src = tpl.thumb ? ('dl/' + tpl.thumb) : '';
        img.alt = tpl.name;
        img.onerror = function() { this.style.display = 'none'; };
        const label = document.createElement('div');
        label.className = 'tile-label';
        label.textContent = tpl.name;
        a.appendChild(img);
        a.appendChild(label);
        grid.appendChild(a);
      });
    }

    // 过滤并渲染
    function applyFilter() {
      let filtered = allTemplates;
      if (activeTab) {
        filtered = filtered.filter(t => tplTab(t) === activeTab);
      }
      if (activeTypeId !== null) {
        filtered = filtered.filter(t => t.type_id === activeTypeId);
      }
      renderGrid(filtered);
    }

    // 渲染子分类按钮（只显示当前大类下实际有模板的分类）
    function renderSubBar() {
      subBar.innerHTML = '';
      if (!activeTab) {
        subBar.classList.remove('show');
        return;
      }
      // 找出当前大类下所有模板的 type_id 集合
      const tabTemplates = allTemplates.filter(t => tplTab(t) === activeTab);
      const usedTypeIds = new Set(tabTemplates.map(t => t.type_id));
      const visibleTypes = allTypes.filter(tp => usedTypeIds.has(tp.id));
      if (visibleTypes.length === 0) {
        subBar.classList.remove('show');
        return;
      }
      visibleTypes.forEach(tp => {
        const btn = document.createElement('div');
        btn.className = 'sub-item';
        btn.textContent = tp.name;
        btn.dataset.typeId = tp.id;
        btn.addEventListener('click', () => {
          if (activeTypeId === tp.id) {
            // 再次点击取消选中
            activeTypeId = null;
            subBar.querySelectorAll('.sub-item').forEach(b => b.classList.remove('active'));
          } else {
            activeTypeId = tp.id;
            subBar.querySelectorAll('.sub-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
          }
          applyFilter();
        });
        subBar.appendChild(btn);
      });
      subBar.classList.add('show');
    }

    // Tab 点击
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const clicked = tab.dataset.tab;
        if (activeTab === clicked) {
          // 再次点击取消选中
          activeTab = null;
          tabs.forEach(t => t.classList.remove('active'));
        } else {
          activeTab = clicked;
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
        }
        activeTypeId = null;
        renderSubBar();
        applyFilter();
      });
    });

    // 分钟数 → HH:MM
    function minsToTime(m) {
      m = parseInt(m) || 0;
      if (m < 0 || m > 1439) m = 0;
      const h = Math.floor(m / 60), mm = m % 60;
      return (h < 10 ? '0' : '') + h + ':' + (mm < 10 ? '0' : '') + mm;
    }

    // 渲染设备信息
    function renderDeviceInfo(dev) {
      const el = document.getElementById('deviceInfo');
      if (!dev) { el.classList.remove('show'); return; }

      const regDate = dev.registered_at ? new Date(dev.registered_at * 1000).toLocaleDateString('zh-CN') : '-';
      const lastReq = dev.getlist_at ? new Date(dev.getlist_at * 1000).toLocaleString('zh-CN') : '-';
      const cellAt  = dev.cell_at ? new Date(dev.cell_at * 1000).toLocaleString('zh-CN') : '';

      const rows = [
        ['注册时间', regDate],
        ['请求次数', String(dev.getlist_count || 0)],
        ['祝福数量', String(dev.blessing_count || 0)],
        ['最后请求', lastReq],
      ];
      if (dev.cell) {
        rows.push(['基站信息', dev.cell + (cellAt ? '  (' + cellAt + ')' : '')]);
      }
      if (dev.manual_location) {
        rows.push(['手动位置', dev.manual_location]);
      }
      rows.push(['切换间隔', '正常 ' + dev.sleep + '秒 / 低电量 ' + dev.sleep_low + '秒']);
      rows.push(['更新时刻', minsToTime(dev.attime)]);
      rows.push(['运行时段', minsToTime(dev.time_start) + ' ~ ' + minsToTime(dev.time_end)]);
      rows.push(['音量', String(dev.volume)]);

      let html = '<div class="device-info-title">设备信息</div><div class="device-info-grid">';
      rows.forEach(([label, value]) => {
        html += '<span class="di-label">' + label + '</span><span class="di-value">' + value + '</span>';
      });
      html += '</div>';
      el.innerHTML = html;
      el.classList.add('show');
    }

    document.getElementById('testOverlayOk').addEventListener('click', () => {
      document.getElementById('testOverlay').classList.remove('show');
    });

    // 初始化：同时加载模板列表和分类列表
    (async () => {
      try {
        const devParams = deviceMonth ? `&month=${encodeURIComponent(deviceMonth)}&mac=${encodeURIComponent(deviceMac)}&key=${encodeURIComponent(deviceKey)}` : '';
        const [resTemplates, resTypes] = await Promise.all([
          fetch('dl/template.php?action=list' + devParams),
          fetch('dl/template.php?action=list_types' + devParams)
        ]);
        const listData = await resTemplates.json();
        console.log('[template.php?action=list]', listData);
        // 兼容新旧格式：新格式 {templates:[], device:{}} 旧格式 []
        allTemplates = Array.isArray(listData) ? listData : (listData.templates || []);
        if (listData.device) {
          deviceInfoData = listData.device;
          const fs = deviceInfoData.factory_status ?? 0;
          if (fs > 2 && fs < 9) {
            document.getElementById('blockOverlay').classList.add('show');
          } else if (fs < 3) {
            document.getElementById('testOverlay').classList.add('show');
          }
        }
        const typesData = await resTypes.json();
        console.log('[template.php?action=list_types]', typesData);
        allTypes = (typesData.types || []).map(t => ({ id: Number(t.id), name: t.name }));
        // 初始：显示全部
        applyFilter();
      } catch (e) {
        console.warn('加载模板数据失败:', e);
      }
    })();
  </script>
</body>
</html>
