<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>祝福牌 · 照片模板</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121826;
      --text: #e6edf3;
      --muted: #9aa4b2;
      --border: rgba(255,255,255,0.10);
      --btn: #1f6feb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: var(--bg);
      color: var(--text);
    }
    .wrap { padding: 12px; max-width: 920px; margin: 0 auto; }

    /* 预览下方图片工具栏 */
    .photo-toolbar {
      display: grid;
      grid-template-columns: 1.25fr repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
      margin-bottom: 4px;
    }
    .photo-toolbar button {
      min-width: 0;
      padding: 10px 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .photo-toolbar button:disabled { opacity: .5; cursor: default; }
    .photo-toolbar .filter-btn.active {
      background: #d1242f;
      border-color: #d1242f;
      color: #fff;
    }
    .photo-toolbar #btnShowOriginal:active {
      background: #374151;
      border-color: #6b7280;
      color: #fff;
    }
    .tune-panel {
      display: none;
      margin: 8px 0 12px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
    }
    .tricolor-params {
      margin: 8px 0 12px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
    }
    .tricolor-params .tp-title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .tricolor-params .tp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }
    .tricolor-params .param-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .tricolor-params label {
      font-size: 11px;
      color: var(--muted);
      margin: 0;
    }
    .tricolor-params input[type="range"] {
      width: 100%;
      accent-color: var(--btn);
    }
    .tricolor-params .param-value {
      font-size: 11px;
      color: var(--text);
      text-align: right;
    }
    .tricolor-params .param-group.checkbox-group {
      flex-direction: row;
      align-items: center;
      gap: 8px;
    }
    .tricolor-params input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--btn);
    }
    .tune-title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .tune-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }
    .tune-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
    }
    .tune-item input {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 7px 8px;
      font-size: 13px;
      outline: none;
    }
    .tune-tip {
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
    }
    @media (max-width: 680px) {
      .tune-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 520px) {
      .photo-toolbar button {
        padding: 9px 0;
        font-size: 12px;
      }
    }

    /* 预览框 */
    .frame {
      width: 100%;
      aspect-ratio: 270 / 400;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      user-select: none;
    }
    /* 用户照片容器（最底层，坐标与 sample 一致）*/
    #photoContainer {
      position: absolute;
      z-index: 1;
      overflow: hidden;
      left: 0; top: 0; width: 100%; height: 100%;
      touch-action: none;
    }
    #photoImg {
      position: absolute;
      display: block;
      transform-origin: 0 0;
      touch-action: none;
    }
    /* 遮罩图（中层）*/
    #maskImg {
      position: absolute;
      inset: 0; width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      z-index: 2;
      pointer-events: none;
    }
    /* 文字层 */
    .text-layer {
      position: absolute;
      z-index: 5;
      font-size: 28px;
      line-height: 1.3;
      white-space: pre-wrap;
      word-break: break-word;
      pointer-events: none;
      display: none;
      padding: 0;
      overflow: hidden;
      justify-content: center;
      align-items: center;
      text-align: center;
      paint-order: stroke fill;
    }
    /* 照片选择占位提示 */
    #photoPlaceholder {
      position: absolute;
      inset: 0; z-index: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
      gap: 10px;
      pointer-events: none;
    }
    #photoPlaceholder svg { opacity: .4; }

    /* 字段卡片 */
    .field-card {
      margin-top: 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .field-card .field-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .field-card .field-title .limit {
      font-size: 11px;
      color: #555;
      font-weight: 400;
      margin-left: 4px;
    }
    .field-card input[type="text"],
    .field-card input[type="date"] {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 10px 12px;
      font-size: 16px;
      line-height: 1.3;
      outline: none;
    }
    .field-card input:focus {
      border-color: rgba(31,111,235,0.7);
      box-shadow: 0 0 0 3px rgba(31,111,235,0.2);
    }
    .field-card input::placeholder { color: #555; }

    .btn-generate {
      margin-top: 16px;
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #3068ff, #5a8cff);
      color: #fff;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-generate:disabled { opacity: .5; cursor: default; }

    .field-status {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      text-align: center;
    }
    .generated-preview {
      display: none;
      margin-top: 12px;
      padding: 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .generated-preview.show { display: block; }
    .generated-preview-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .generated-preview img {
      width: 100%;
      max-width: 270px;
      aspect-ratio: 540 / 800;
      object-fit: contain;
      display: block;
      margin: 0 auto;
      border-radius: 8px;
      background: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .preview-stack {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    /* 录音 */
    .record-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 20px;
    }
    .record-btn {
      width: 96px; height: 96px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--panel);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .record-btn:hover { border-color: #d1242f; background: rgba(209,36,47,0.1); }
    .record-btn:active { transform: scale(0.95); }
    .record-btn.recording {
      border-color: #d1242f;
      background: rgba(209,36,47,0.2);
      animation: pulse 1s infinite;
    }
    .record-btn.recording svg path { fill: #d1242f; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(209,36,47,0.4); }
      50%      { box-shadow: 0 0 0 10px rgba(209,36,47,0); }
    }
    .record-progress {
      display: none; width: 80px; height: 6px;
      background: rgba(255,255,255,0.1); border-radius: 3px;
      margin-bottom: 10px; position: relative; overflow: hidden;
    }
    .record-progress.show { display: block; }
    .record-progress-bar { height: 100%; background: #d1242f; border-radius: 3px; width: 100%; transition: width 0.1s linear; }
    .record-timer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 14px; color: #d1242f; font-weight: bold; }
    .record-hint { margin-top: 10px; font-size: 12px; color: var(--muted); }

    /* 发送 */
    .send-section { margin-top: 20px; display: flex; justify-content: center; }
    .send-btn {
      background: #8b0000; color: #fff; border: none;
      border-radius: 12px; padding: 14px 40px;
      font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s ease;
    }
    .send-btn:hover { background: #a00000; }
    .send-btn:active { transform: scale(0.98); }

    /* 发送成功 */
    .send-success-overlay {
      display: none; position: fixed; inset: 0;
      background: #0f172a; z-index: 9999;
      justify-content: center; align-items: center;
    }
    .send-success-overlay.show { display: flex; }
    .send-success-content { text-align: center; padding: 20px; }
    .send-success-text { font-size: 20px; color: #fff; margin-bottom: 16px; }
    .send-success-time { font-size: 16px; color: #d1242f; }

    /* 加载遮罩 */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      display: none; place-items: center;
      z-index: 999; padding: 16px;
    }
    .overlay.show { display: grid; }
    .overlay-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 18px;
      width: min(90vw,360px); color: var(--text); text-align: center;
    }
    .overlay-title { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
    .overlay-bar {
      height: 8px; border-radius: 999px;
      background: rgba(255,255,255,0.08); overflow: hidden; margin-bottom: 10px;
    }
    .overlay-bar > span {
      display: block; height: 100%; width: 45%;
      background: var(--btn); border-radius: inherit;
      animation: loadingBar 1.2s ease-in-out infinite;
    }
    @keyframes loadingBar {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(80%); }
      100% { transform: translateX(220%); }
    }
    .overlay-hint { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>

  <div class="wrap">
    <input type="file" id="filePhoto" accept="image/*" style="display:none" />

    <!-- 预览框 -->
    <div class="frame" id="frame">
      <div id="photoPlaceholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <span>点击下方按钮选择照片</span>
      </div>
      <div id="photoContainer">
        <img id="photoImg" alt="" style="display:none" />
      </div>
      <img id="maskImg" alt="" style="display:none" />
      <!-- 文字层由 JS 动态插入 -->
    </div>

    <div class="photo-toolbar">
      <button id="btnPickPhoto" type="button">选择图片</button>
      <button id="btnShowOriginal" type="button">原图</button>
      <button type="button" class="filter-btn" data-filter="red">红</button>
      <button type="button" class="filter-btn active" data-filter="bwred">黑白红</button>
    </div>
    <div class="tune-panel" id="redTunePanel" style="display:none;">
      <div class="tune-title">红色临时调参：改完会立即刷新当前红色效果，刷新页面后恢复默认</div>
      <div class="tune-grid">
        <label class="tune-item">对比
          <input id="redContrast" type="number" step="0.05" value="1.25" />
        </label>
        <label class="tune-item">曲线γ
          <input id="redGamma" type="number" step="0.05" value="0.85" />
        </label>
        <label class="tune-item">暗红R
          <input id="redBaseR" type="number" min="0" max="255" step="1" value="138" />
        </label>
        <label class="tune-item">暗红G
          <input id="redBaseG" type="number" min="0" max="255" step="1" value="15" />
        </label>
        <label class="tune-item">暗红B
          <input id="redBaseB" type="number" min="0" max="255" step="1" value="24" />
        </label>
      </div>
      <div class="tune-tip">建议先调“对比”和“曲线γ”，再细调 RGB。</div>
    </div>

        <div class="tricolor-params" id="tricolorPanel" style="display:none;">
      <div class="tp-title">三色抖动参数（黑白红模式）</div>
      <div class="tp-grid">
        <div class="param-group">
          <label>黑白阈值 <span class="param-value" id="tcBwVal">120</span></label>
          <input type="range" id="tcBwThreshold" min="0" max="255" value="120" />
        </div>
        <div class="param-group">
          <label>Gamma <span class="param-value" id="tcGammaVal">0.90</span></label>
          <input type="range" id="tcGamma" min="10" max="300" value="90" />
        </div>
        <div class="param-group">
          <label>自动色阶% <span class="param-value" id="tcAutoLvlVal">1.5</span></label>
          <input type="range" id="tcAutoLevelsSlider" min="0" max="100" value="15" />
        </div>
        <div class="param-group">
          <label>饱和度阈值 <span class="param-value" id="tcSatVal">0.40</span></label>
          <input type="range" id="tcSatThreshold" min="0" max="100" value="40" />
        </div>
        <div class="param-group">
          <label>明度阈值 <span class="param-value" id="tcValVal">0.20</span></label>
          <input type="range" id="tcValThreshold" min="0" max="100" value="20" />
        </div>
        <div class="param-group">
          <label>红色增量 <span class="param-value" id="tcRedDeltaVal">50</span></label>
          <input type="range" id="tcRedDelta" min="0" max="200" value="50" />
        </div>
        <div class="param-group">
          <label>色相宽度 <span class="param-value" id="tcHueVal">0.06</span></label>
          <input type="range" id="tcHueWidth" min="1" max="30" value="6" />
        </div>
        <div class="param-group">
          <label>红色阈值 <span class="param-value" id="tcRedThVal">100</span></label>
          <input type="range" id="tcRedThreshold" min="0" max="255" value="100" />
        </div>
        <div class="param-group">
          <label>红色增强 <span class="param-value" id="tcRedBoostVal">1.5</span></label>
          <input type="range" id="tcRedBoost" min="0" max="50" value="15" />
        </div>
        <div class="param-group checkbox-group">
          <input type="checkbox" id="tcRedDither" checked />
          <label>红色抖动</label>
        </div>
        <div class="param-group checkbox-group">
          <input type="checkbox" id="tcAutoLevels" checked />
          <label>自动色阶</label>
        </div>
      </div>
    </div>

<!-- 动态字段卡 -->
    <div id="fieldsArea"></div>

    <button type="button" class="btn-generate" id="btnGenerate" disabled>生成祝福牌</button>
    <div class="field-status" id="genStatus"></div>
    <div class="preview-stack">
      <div class="generated-preview" id="generatedPreviewBox">
        <div class="generated-preview-title">合成后的图片预览</div>
        <img id="generatedPreviewImg" alt="合成预览图" />
      </div>
      <div class="generated-preview" id="photoOnlyPreviewBox">
        <div class="generated-preview-title">仅照片预览（无文字、无遮罩）</div>
        <img id="photoOnlyPreviewImg" alt="仅照片预览图" />
      </div>
      <div class="generated-preview" id="overlayOnlyPreviewBox">
        <div class="generated-preview-title">仅遮罩层和文字层预览（透明 PNG）</div>
        <img id="overlayOnlyPreviewImg" alt="仅遮罩和文字预览图" />
      </div>
      <div class="generated-preview" id="ditheredPreviewBox">
        <div class="generated-preview-title">抖动处理后的照片（270×400 三色）</div>
        <canvas id="ditheredPreviewCanvas" width="270" height="400" style="max-width:100%;image-rendering:pixelated;"></canvas>
      </div>
      <div class="generated-preview" id="overlayScaledPreviewBox">
        <div class="generated-preview-title">遮罩层+文字层缩放（270×400 透明）</div>
        <canvas id="overlayScaledCanvas" width="270" height="400" style="max-width:100%;"></canvas>
      </div>
      <div class="generated-preview" id="compositeSmallPreviewBox">
        <div class="generated-preview-title">最终合成（抖动照片 + 遮罩文字 270×400）</div>
        <canvas id="compositeSmallCanvas" width="270" height="400" style="width:60%;display:block;margin:0 auto;image-rendering:pixelated;"></canvas>
      </div>

    </div>

    <!-- 录音 -->
    <div class="record-section" style="display:none;">
      <div class="record-progress" id="recordProgress">
        <div class="record-progress-bar" id="recordProgressBar"></div>
        <span class="record-timer" id="recordTimer">10</span>
      </div>
      <button id="btnRecord" class="record-btn" aria-label="录音">
        <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" width="56" height="56">

          <path d="M825.1 380.4c-18.4 0-33.3 14.9-33.3 33.3v186.5c0 69.8-57.5 126.6-128.3 126.6h-303c-70.7 0-128.3-56.8-128.3-126.6V413.7c0-18.4-14.9-33.3-33.3-33.3s-33.3 14.9-33.3 33.3v186.5c0 106.5 87.4 193.2 194.9 193.2H472V920c0 22 18 40 40 40s40-18 40-40V793.5h111.5c107.5 0 194.9-86.7 194.9-193.2V413.7c0-18.4-14.9-33.3-33.3-33.3z" fill="#bfbfbf"/>
        </svg>
      </button>
      <div class="record-hint">可录制祝福语</div>
      <audio id="recordedAudio" style="display:none;"></audio>
    </div>

    <!-- 发送 -->
    <div class="send-section" style="display:none;">
      <button id="btnSendBlessing" class="send-btn">发送祝福</button>
    </div>
  </div>

  <!-- 发送成功 -->
  <div id="sendSuccessOverlay" class="send-success-overlay">
    <div class="send-success-content">
      <div class="send-success-text">祝福已经发送到你的祝福牌</div>
      <div class="send-success-time">将在 00:00 分更新</div>
    </div>
  </div>

  <!-- 加载遮罩 -->
  <div id="loadingOverlay" class="overlay" role="dialog" aria-live="polite">
    <div class="overlay-card">
      <div class="overlay-title">正在生成祝福牌</div>
      <div class="overlay-bar"><span></span></div>
      <div class="overlay-hint">请稍后…</div>
    </div>
  </div>

  <script src="../../tricolor.js"></script>
  <script>
    const FONT_API = '../../font/dfont.php';
    const loadingOverlay = document.getElementById('loadingOverlay');
    const generatedPreviewBox = document.getElementById('generatedPreviewBox');
    const generatedPreviewImg = document.getElementById('generatedPreviewImg');
    const photoOnlyPreviewBox = document.getElementById('photoOnlyPreviewBox');
    const photoOnlyPreviewImg = document.getElementById('photoOnlyPreviewImg');
    const overlayOnlyPreviewBox = document.getElementById('overlayOnlyPreviewBox');
    const overlayOnlyPreviewImg = document.getElementById('overlayOnlyPreviewImg');
    const ditheredPreviewBox = document.getElementById('ditheredPreviewBox');
    const ditheredPreviewCanvas = document.getElementById('ditheredPreviewCanvas');
    const overlayScaledPreviewBox = document.getElementById('overlayScaledPreviewBox');
    const overlayScaledCanvas = document.getElementById('overlayScaledCanvas');
    const compositeSmallPreviewBox = document.getElementById('compositeSmallPreviewBox');
    const compositeSmallCanvas = document.getElementById('compositeSmallCanvas');

    // ── URL 参数 ──────────────────────────────────────────────
    const urlParams  = new URLSearchParams(window.location.search);
    const templateId = urlParams.get('template_id') || '';

    // ── 模板配置 ──────────────────────────────────────────────
    let templateConfig = null;   // 完整 config JSON
    let zoneConfigs    = [];     // config.zones[]

    // ── 字体缓存 / 照片状态 ───────────────────────────────────
    const loadedFonts = {};
    let sourcePhotoDataUrl = '';
    let sourcePhotoImg = null;  // 缓存原始照片 Image 对象（未经滤镜处理）
    let currentPhotoFilter = 'bwred';
    let lastGeneratedImageBlob = null;

    function clamp(n, min, max) {
      n = Number(n);
      if (!Number.isFinite(n)) return min;
      return Math.max(min, Math.min(max, n));
    }
    function getRedTuneSettings() {
      return {
        contrast: clamp(document.getElementById('redContrast').value, 0.4, 3),
        gamma: clamp(document.getElementById('redGamma').value, 0.3, 2),
        baseR: clamp(document.getElementById('redBaseR').value, 0, 255),
        baseG: clamp(document.getElementById('redBaseG').value, 0, 255),
        baseB: clamp(document.getElementById('redBaseB').value, 0, 255)
      };
    }

    // ── 日期格式化（与 pic_create.html 一致）─────────────────
    const CN_DIGITS = ['零','一','二','三','四','五','六','七','八','九'];
    function numToCn(n) { return String(n).split('').map(c => CN_DIGITS[parseInt(c)]).join(''); }
    function monthToCn(m) { if (m<=10) return CN_DIGITS[m]; if (m===11) return '十一'; return '十二'; }
    function dayToCn(d) {
      if (d<=10) return CN_DIGITS[d]; if (d<20) return '十'+CN_DIGITS[d-10];
      if (d===20) return '二十'; if (d<30) return '二十'+CN_DIGITS[d-20];
      if (d===30) return '三十'; return '三十'+CN_DIGITS[d-30];
    }
    const TIAN_GAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
    const DI_ZHI   = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    const DZ_MONTH = ['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'];
    function yearToGanZhi(y) { return TIAN_GAN[(y-4)%10]+DI_ZHI[(y-4)%12]; }
    function monthToGanZhi(m) { return DZ_MONTH[m-1]+'月'; }
    function formatDate(dateStr, fmt) {
      if (!dateStr) return '';
      const [fy,fm,fd] = dateStr.split('-').map(Number);
      const y2 = fy % 100;
      switch (fmt) {
        case 'cn_full':   return numToCn(y2)+'年'+monthToCn(fm)+'月'+dayToCn(fd)+'日';
        case 'cn_ym':     return numToCn(y2)+'·'+monthToCn(fm)+'月';
        case 'gz':        return yearToGanZhi(fy)+'年·'+monthToGanZhi(fm);
        case 'num_full':  return y2+'年'+String(fm).padStart(2,'0')+'月'+String(fd).padStart(2,'0')+'日';
        case 'num_ym':    return y2+'年'+String(fm).padStart(2,'0')+'月';
        case 'dash_full': return y2+'·'+String(fm).padStart(2,'0')+'·'+String(fd).padStart(2,'0');
        case 'dash_ym':   return y2+'·'+String(fm).padStart(2,'0');
        default: return dateStr;
      }
    }

    // ── 加载字体 ──────────────────────────────────────────────
    async function loadFont(fontName, text) {
      if (!fontName || fontName === 'default') return 'inherit';
      const cacheKey = fontName + '|' + text;
      if (loadedFonts[cacheKey]) return loadedFonts[cacheKey];
      const uniqueChars = [...new Set(text.replace(/\s/g, ''))].join('');
      try {
        const url = `${FONT_API}?font=${encodeURIComponent(fontName)}&text=${encodeURIComponent(uniqueChars)}`;
        const resp = await fetch(url);
        if (!resp.ok) return fontName;
        const data = await resp.arrayBuffer();
        const familyKey = `PF_${fontName}_${Date.now()}`;
        const face = new FontFace(familyKey, data);
        await face.load();
        document.fonts.add(face);
        loadedFonts[cacheKey] = familyKey;
        return familyKey;
      } catch { return fontName; }
    }

    // ── 应用图层样式 ──────────────────────────────────────────
    function applyLayerStyle(layerEl, z, text) {
      if (!text) { layerEl.style.display = 'none'; return; }
      layerEl.style.display = 'flex';
      // 位置
      layerEl.style.left   = (z.x / 270 * 100) + '%';
      layerEl.style.top    = (z.y / 400 * 100) + '%';
      layerEl.style.width  = (z.w / 270 * 100) + '%';
      layerEl.style.height = (z.h / 400 * 100) + '%';
      // 文字
      layerEl.style.fontSize      = (z.size || 20) + 'px';
      layerEl.style.color         = z.color || '#111111';
      layerEl.style.backgroundColor = z.bgc || 'transparent';
      layerEl.style.letterSpacing = (z.spacing || 0) + 'px';
      layerEl.style.lineHeight    = z.lineH || 1.3;
      layerEl.style.justifyContent = z.alignH || 'center';
      layerEl.style.alignItems     = z.alignV || 'center';
      layerEl.style.textAlign = z.alignH === 'flex-start' ? 'left' : z.alignH === 'flex-end' ? 'right' : 'center';
      layerEl.style.borderRadius  = (z.radius || 0) + 'px';
      layerEl.style.transform     = z.rotate ? `rotate(${z.rotate}deg)` : '';
      const sw = parseFloat(z.strokeW) || 0;
      layerEl.style.webkitTextStroke = sw > 0 ? `${sw}px ${z.strokeC || '#000000'}` : '';
      // 内容
      let sp = layerEl.firstElementChild;
      if (!sp) { sp = document.createElement('span'); layerEl.appendChild(sp); }
      sp.textContent = text;
      sp.style.writingMode = (z.dir === 'v') ? 'vertical-lr' : 'horizontal-tb';
      sp.style.width       = (z.dir === 'v') ? '' : '100%';
    }

    // ── 动态生成字段卡片 ─────────────────────────────────────
    // zone → { inputEl, dateEl, fmtEl, layerEl, zoneData }
    const zoneInputs = [];

    function buildFields() {
      const area = document.getElementById('fieldsArea');
      area.innerHTML = '';
      zoneInputs.length = 0;
      const frame = document.getElementById('frame');

      zoneConfigs.forEach((z, idx) => {
        // 创建 text-layer
        const layerEl = document.createElement('div');
        layerEl.className = 'text-layer';
        layerEl.style.display = 'none';
        frame.appendChild(layerEl);

        const card = document.createElement('div');
        card.className = 'field-card';

        const title = document.createElement('div');
        title.className = 'field-title';
        title.textContent = z.name || (z.type === 'date' ? '时间' : '文字');

        if (z.type !== 'date') {
          const limitSpan = document.createElement('span');
          limitSpan.className = 'limit';
          const min = z.minLen || 0, max = z.maxLen || 0;
          if (min > 0 && max > 0) limitSpan.textContent = min === max ? `（必须${min}字）` : `（${min}~${max}字）`;
          else if (max > 0) limitSpan.textContent = `（≤${max}字）`;
          else if (min > 0) limitSpan.textContent = `（≥${min}字）`;
          title.appendChild(limitSpan);
        }
        card.appendChild(title);

        let inputEl = null, dateEl = null, fmtEl = null;

        if (z.type === 'date') {
          dateEl = document.createElement('input');
          dateEl.type = 'date';
          // 默认今天
          const d = new Date();
          dateEl.value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          card.appendChild(dateEl);
          zoneInputs.push({ dateEl, layerEl, zoneData: z });
        } else {
          inputEl = document.createElement('input');
          inputEl.type = 'text';
          inputEl.placeholder = z.name || '请输入';
          if (z.maxLen > 0) inputEl.maxLength = z.maxLen;
          card.appendChild(inputEl);
          zoneInputs.push({ inputEl, layerEl, zoneData: z });
        }

        area.appendChild(card);
      });

      // 若无文字区，直接允许生成（只有照片+遮罩）
      if (zoneConfigs.length === 0) {
        document.getElementById('btnGenerate').disabled = false;
      }
    }

    // ── 加载模板配置 ──────────────────────────────────────────
    (async function () {
      if (!templateId) return;
      try {
        const resp = await fetch('../template.php?action=get_config&template_id=' + encodeURIComponent(templateId));
        const json = await resp.json();
        if (!json.ok) return;
        templateConfig = JSON.parse(json.config || '{}');
        zoneConfigs = templateConfig.zones || [];

        // 加载遮罩图（top_img）
        if (json.top_img) {
          const maskImg = document.getElementById('maskImg');
          maskImg.src = '../' + json.top_img;
          maskImg.style.display = 'block';
        }

        // 设置示例图坐标到 photoContainer（用户未选照片时作参考）
        if (templateConfig.sample) {
          setPhotoContainerPos(templateConfig.sample);
        }

        buildFields();
        document.getElementById('btnGenerate').disabled = false;
      } catch (e) {
        console.warn('模板配置加载失败:', e);
      }
    })();

    // ── 照片容器位置（270×400 坐标系转 %）────────────────────
    function setPhotoContainerPos(sample) {
      const pc = document.getElementById('photoContainer');
      pc.style.left   = ((sample.x || 0) / 270 * 100) + '%';
      pc.style.top    = ((sample.y || 0) / 400 * 100) + '%';
      pc.style.width  = ((sample.w || 270) / 270 * 100) + '%';
      pc.style.height = ((sample.h || 400) / 400 * 100) + '%';
    }

    // ── 选择照片 + 滤镜 ──────────────────────────────────────
    const filePhoto = document.getElementById('filePhoto');
    const photoImg = document.getElementById('photoImg');

    function setActiveFilter(filter) {
      if (filter !== 'original') currentPhotoFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === currentPhotoFilter);
      });
    }

    function showPhoto(url) {
      photoImg.onload = () => {
        fitPhotoCover();
        applyPhotoTransform();
      };
      photoImg.src = url;
      photoImg.style.display = 'block';
      document.getElementById('photoPlaceholder').style.display = 'none';
      lastGeneratedImageBlob = null;
    }

    /** 计算 cover 尺寸并设置初始居中偏移 */
    function fitPhotoCover() {
      const pc = document.getElementById('photoContainer');
      const cw = pc.clientWidth, ch = pc.clientHeight;
      const iw = photoImg.naturalWidth, ih = photoImg.naturalHeight;
      if (!iw || !ih || !cw || !ch) return;

      const srcRatio = iw / ih;
      const dstRatio = cw / ch;
      let dispW, dispH;
      if (srcRatio > dstRatio) {
        // 图片更宽，高度填满，宽度溢出
        dispH = ch;
        dispW = ch * srcRatio;
      } else {
        // 图片更高，宽度填满，高度溢出
        dispW = cw;
        dispH = cw / srcRatio;
      }
      photoImg.style.width = dispW + 'px';
      photoImg.style.height = dispH + 'px';

      // 初始居中偏移（只在 scale=1 时设置）
      photoTransform.baseW = dispW;
      photoTransform.baseH = dispH;
      photoTransform.containerW = cw;
      photoTransform.containerH = ch;
      photoTransform.tx = (cw - dispW) / 2;
      photoTransform.ty = (ch - dispH) / 2;
      photoTransform.scale = 1;
    }

    function renderPhotoByFilter(filter) {
      setActiveFilter(filter);
      if (!sourcePhotoDataUrl) return;

      if (filter === 'original') {
        showPhoto(sourcePhotoDataUrl);
        return;
      }

      const tune = getRedTuneSettings();
      const tmpImg = new Image();
      tmpImg.onload = function () {
        const cv = document.createElement('canvas');
        cv.width = tmpImg.naturalWidth;
        cv.height = tmpImg.naturalHeight;
        const ctx = cv.getContext('2d');
        ctx.drawImage(tmpImg, 0, 0);
        const imageData = ctx.getImageData(0, 0, cv.width, cv.height);
        const d = imageData.data;
        const src = new Uint8ClampedArray(d);

        for (let i = 0; i < d.length; i += 4) {
          const r = src[i], g = src[i + 1], b = src[i + 2];
          let v = Math.round(r * 0.299 + g * 0.587 + b * 0.114);
          v = clamp((v - 128) * tune.contrast + 128, 0, 255);

          if (filter === 'red') {
            const t = Math.pow(v / 255, tune.gamma);
            d[i]     = Math.round(tune.baseR + (255 - tune.baseR) * t);
            d[i + 1] = Math.round(tune.baseG + (255 - tune.baseG) * t);
            d[i + 2] = Math.round(tune.baseB + (255 - tune.baseB) * t);
          } else if (filter === 'bwred') {
            let nr = v, ng = v, nb = v;
            const t = Math.pow(v / 255, tune.gamma);
            const mappedR = Math.round(tune.baseR + (255 - tune.baseR) * t);
            const mappedG = Math.round(tune.baseG + (255 - tune.baseG) * t);
            const mappedB = Math.round(tune.baseB + (255 - tune.baseB) * t);
            const redDominance = Math.max(0, r - Math.max(g, b));
            const saturation = Math.max(r, g, b) - Math.min(r, g, b);
            const weight = Math.min(1, Math.max(0, (redDominance - 10) / 110)) * Math.min(1, (saturation + 20) / 140);
            if (weight > 0) {
              nr = Math.round(v * (1 - weight) + mappedR * weight);
              ng = Math.round(v * (1 - weight) + mappedG * weight);
              nb = Math.round(v * (1 - weight) + mappedB * weight);
            }
            d[i] = nr;
            d[i + 1] = ng;
            d[i + 2] = nb;
          }
        }

        ctx.putImageData(imageData, 0, 0);
        showPhoto(cv.toDataURL('image/png'));
      };
      tmpImg.src = sourcePhotoDataUrl;
    }

    document.getElementById('btnPickPhoto').addEventListener('click', () => filePhoto.click());
    const btnShowOriginal = document.getElementById('btnShowOriginal');
    btnShowOriginal.addEventListener('pointerdown', e => {
      e.preventDefault();
      if (sourcePhotoDataUrl) renderPhotoByFilter('original');
    });
    ['pointerup', 'pointerleave', 'pointercancel'].forEach(evt => {
      btnShowOriginal.addEventListener(evt, () => {
        if (sourcePhotoDataUrl) renderPhotoByFilter(currentPhotoFilter);
      });
    });
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => renderPhotoByFilter(btn.dataset.filter));
    });
    document.querySelectorAll('#redTunePanel input').forEach(input => {
      input.addEventListener('input', () => {
        if (sourcePhotoDataUrl && (currentPhotoFilter === 'red' || currentPhotoFilter === 'bwred')) {
          renderPhotoByFilter(currentPhotoFilter);
        }
      });
    });

    // 三色参数面板：滑块数值显示 + 自动刷新抖动预览
    const tcSliderMap = {
      tcBwThreshold: { display: 'tcBwVal', format: v => v },
      tcGamma:       { display: 'tcGammaVal', format: v => (v / 100).toFixed(2) },
      tcAutoLevelsSlider: { display: 'tcAutoLvlVal', format: v => (v / 10).toFixed(1) },
      tcSatThreshold: { display: 'tcSatVal', format: v => (v / 100).toFixed(2) },
      tcValThreshold: { display: 'tcValVal', format: v => (v / 100).toFixed(2) },
      tcRedDelta:    { display: 'tcRedDeltaVal', format: v => v },
      tcHueWidth:    { display: 'tcHueVal', format: v => (v / 100).toFixed(2) },
      tcRedThreshold:{ display: 'tcRedThVal', format: v => v },
      tcRedBoost:    { display: 'tcRedBoostVal', format: v => (v / 10).toFixed(1) },
    };
    Object.entries(tcSliderMap).forEach(([sliderId, cfg]) => {
      const slider = document.getElementById(sliderId);
      const display = document.getElementById(cfg.display);
      if (!slider || !display) return;
      slider.addEventListener('input', () => {
        display.textContent = cfg.format(parseInt(slider.value));
        if (sourcePhotoDataUrl && currentPhotoFilter === 'bwred') {
          renderPhotoByFilter(currentPhotoFilter);
          refreshDitherPreviews();
        }
      });
    });
    ['tcRedDither', 'tcAutoLevels'].forEach(id => {
      const cb = document.getElementById(id);
      if (!cb) return;
      cb.addEventListener('change', () => {
        if (sourcePhotoDataUrl && currentPhotoFilter === 'bwred') {
          renderPhotoByFilter(currentPhotoFilter);
          refreshDitherPreviews();
        }
      });
    });
    filePhoto.addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        sourcePhotoDataUrl = e.target.result;
        // 缓存原始照片 Image 对象，供抖动时直接使用（避免从已滤镜处理的 photoImg 取图）
        const origImg = new Image();
        origImg.onload = () => {
          sourcePhotoImg = origImg;
          setActiveFilter('bwred');
          renderPhotoByFilter(currentPhotoFilter || 'bwred');
        };
        origImg.src = sourcePhotoDataUrl;
      };
      reader.readAsDataURL(file);
    });

    // ── 照片缩放/平移手势 ───────────────────────────────
    const photoTransform = { scale: 1, tx: 0, ty: 0 };
    const activePointers = new Map();
    let lastPinchDist = 0;
    let dragStartX = 0, dragStartY = 0;
    let dragStartTx = 0, dragStartTy = 0;

    function applyPhotoTransform() {
      photoImg.style.transform = `translate(${photoTransform.tx}px, ${photoTransform.ty}px) scale(${photoTransform.scale})`;
    }

    function getPinchDist(p1, p2) {
      const dx = p1.clientX - p2.clientX;
      const dy = p1.clientY - p2.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function getPinchCenter(p1, p2) {
      return { x: (p1.clientX + p2.clientX) / 2, y: (p1.clientY + p2.clientY) / 2 };
    }

    const photoContainer = document.getElementById('photoContainer');

    photoContainer.addEventListener('pointerdown', e => {
      if (!sourcePhotoDataUrl) return;
      e.preventDefault();
      photoContainer.setPointerCapture(e.pointerId);
      activePointers.set(e.pointerId, e);

      if (activePointers.size === 1) {
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        dragStartTx = photoTransform.tx;
        dragStartTy = photoTransform.ty;
      } else if (activePointers.size === 2) {
        const pts = [...activePointers.values()];
        lastPinchDist = getPinchDist(pts[0], pts[1]);
      }
    });

    photoContainer.addEventListener('pointermove', e => {
      if (!activePointers.has(e.pointerId)) return;
      activePointers.set(e.pointerId, e);

      if (activePointers.size === 1) {
        // 单指拖动
        photoTransform.tx = dragStartTx + (e.clientX - dragStartX);
        photoTransform.ty = dragStartTy + (e.clientY - dragStartY);
      } else if (activePointers.size === 2) {
        // 双指缩放
        const pts = [...activePointers.values()];
        const newDist = getPinchDist(pts[0], pts[1]);
        const ratio = newDist / lastPinchDist;
        const newScale = Math.max(1, Math.min(5, photoTransform.scale * ratio));

        // 以双指中心为缩放中心
        const center = getPinchCenter(pts[0], pts[1]);
        const containerRect = photoContainer.getBoundingClientRect();
        const cx = center.x - containerRect.left;
        const cy = center.y - containerRect.top;

        const scaleDelta = newScale / photoTransform.scale;
        photoTransform.tx = cx - scaleDelta * (cx - photoTransform.tx);
        photoTransform.ty = cy - scaleDelta * (cy - photoTransform.ty);
        photoTransform.scale = newScale;

        lastPinchDist = newDist;
      }
      applyPhotoTransform();
    });

    function onPointerEnd(e) {
      activePointers.delete(e.pointerId);
      if (activePointers.size === 1) {
        // 切换为单指拖动：以剩余手指为新起点
        const remaining = [...activePointers.values()][0];
        dragStartX = remaining.clientX;
        dragStartY = remaining.clientY;
        dragStartTx = photoTransform.tx;
        dragStartTy = photoTransform.ty;
      }
    }
    photoContainer.addEventListener('pointerup', onPointerEnd);
    photoContainer.addEventListener('pointercancel', onPointerEnd);

    // ── 生成祝福牌 ────────────────────────────────────────────
    document.getElementById('btnGenerate').addEventListener('click', async () => {
      const genStatus = document.getElementById('genStatus');
      genStatus.textContent = '';
      genStatus.style.color = '';
      const btn = document.getElementById('btnGenerate');
      btn.disabled = true;
      loadingOverlay.classList.add('show');

      try {
        if (!sourcePhotoDataUrl) {
          genStatus.textContent = '请先选择照片';
          genStatus.style.color = '#f85149';
          return;
        }

        for (const zi of zoneInputs) {
          const { layerEl, zoneData: z } = zi;
          let text = '';

          if (z.type === 'date') {
            text = formatDate(zi.dateEl.value, z.dateFmt || 'num_full');
          } else {
            text = zi.inputEl.value.trim();
            // 字数校验
            const min = z.minLen || 0, max = z.maxLen || 0;
            if (min > 0 && text.length < min) {
              genStatus.textContent = `「${z.name}」至少需要${min}字`;
              genStatus.style.color = '#f85149';
              btn.disabled = false;
              loadingOverlay.classList.remove('show');
              return;
            }
            if (max > 0 && text.length > max) {
              genStatus.textContent = `「${z.name}」最多${max}字`;
              genStatus.style.color = '#f85149';
              btn.disabled = false;
              loadingOverlay.classList.remove('show');
              return;
            }
          }

          if (!text) { layerEl.style.display = 'none'; continue; }

          // 加载字体
          const familyKey = await loadFont(z.font, text);
          applyLayerStyle(layerEl, z, text);
          if (familyKey && familyKey !== 'inherit') layerEl.style.fontFamily = familyKey;
        }

        lastGeneratedImageBlob = await buildImageBlob();
        const photoOnlyBlob = await buildPhotoOnlyBlob();
        const overlayOnlyBlob = await buildOverlayOnlyBlob();
        generatedPreviewImg.src = URL.createObjectURL(lastGeneratedImageBlob);
        photoOnlyPreviewImg.src = URL.createObjectURL(photoOnlyBlob);
        overlayOnlyPreviewImg.src = URL.createObjectURL(overlayOnlyBlob);

        // 抖动处理：将照片缩小到 270×400 并进行三色抖动
        const ditheredCanvas = buildDitheredPhotoCanvas();
        ditheredPreviewCanvas.width = ditheredCanvas.width;
        ditheredPreviewCanvas.height = ditheredCanvas.height;
        const dctx = ditheredPreviewCanvas.getContext('2d');
        dctx.drawImage(ditheredCanvas, 0, 0);

        // 遮罩+文字层缩放到 270×400（保持透明）
        const overlayImg = new Image();
        overlayImg.onload = () => {
          overlayScaledCanvas.width = 270;
          overlayScaledCanvas.height = 400;
          const octx = overlayScaledCanvas.getContext('2d');
          octx.clearRect(0, 0, 270, 400);
          octx.drawImage(overlayImg, 0, 0, 270, 400);
          overlayScaledPreviewBox.classList.add('show');

          // 最终合成：抖动照片底层 + 遮罩文字顶层
          compositeSmallCanvas.width = 270;
          compositeSmallCanvas.height = 400;
          const cctx = compositeSmallCanvas.getContext('2d');
          cctx.drawImage(ditheredCanvas, 0, 0);
          cctx.drawImage(overlayScaledCanvas, 0, 0);
          compositeSmallPreviewBox.classList.add('show');
        };
        overlayImg.src = URL.createObjectURL(overlayOnlyBlob);

        generatedPreviewBox.classList.add('show');
        photoOnlyPreviewBox.classList.add('show');
        overlayOnlyPreviewBox.classList.add('show');
        ditheredPreviewBox.classList.add('show');

        document.querySelector('.record-section').style.display = '';
        document.querySelector('.send-section').style.display = '';
        btn.textContent = '重新生成';
        genStatus.textContent = '预览图已生成，可发送祝福';
        genStatus.style.color = 'var(--muted)';
      } catch (err) {
        genStatus.textContent = '生成失败: ' + err.message;
        genStatus.style.color = '#f85149';
      } finally {
        btn.disabled = false;
        loadingOverlay.classList.remove('show');
      }
    });

    // ── Canvas 合成（照片 + 遮罩 + 文字层）────────────────────
    function drawImageCover(ctx, img, dx, dy, dw, dh) {
      const iw = img.naturalWidth || img.width;
      const ih = img.naturalHeight || img.height;
      if (!iw || !ih || !dw || !dh) return;

      const srcRatio = iw / ih;
      const dstRatio = dw / dh;
      let sx = 0, sy = 0, sw = iw, sh = ih;

      if (srcRatio > dstRatio) {
        sw = ih * dstRatio;
        sx = (iw - sw) / 2;
      } else {
        sh = iw / dstRatio;
        sy = (ih - sh) / 2;
      }

      ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
    }

    /**
     * 绘制照片并应用用户的缩放/平移变换
     * containerW/containerH: 目标容器尺寸（逻辑坐标）
     */
    function drawImageWithTransform(ctx, img, dx, dy, containerW, containerH) {
      const iw = img.naturalWidth || img.width;
      const ih = img.naturalHeight || img.height;
      if (!iw || !ih || !containerW || !containerH) return;

      // 计算 cover 尺寸（与 fitPhotoCover 一致）
      const srcRatio = iw / ih;
      const dstRatio = containerW / containerH;
      let dispW, dispH;
      if (srcRatio > dstRatio) {
        dispH = containerH;
        dispW = containerH * srcRatio;
      } else {
        dispW = containerW;
        dispH = containerW / srcRatio;
      }

      // 将 CSS px 变换映射到逻辑坐标
      const pc = document.getElementById('photoContainer');
      const pcRect = pc.getBoundingClientRect();
      const pxToLogicX = containerW / pcRect.width;
      const pxToLogicY = containerH / pcRect.height;

      const s = photoTransform.scale;
      const txL = photoTransform.tx * pxToLogicX;
      const tyL = photoTransform.ty * pxToLogicY;

      ctx.save();
      ctx.beginPath();
      ctx.rect(dx, dy, containerW, containerH);
      ctx.clip();
      ctx.translate(dx + txL, dy + tyL);
      ctx.scale(s, s);
      // 绘制完整图片到 cover 尺寸
      ctx.drawImage(img, 0, 0, iw, ih, 0, 0, dispW, dispH);
      ctx.restore();
    }

    function buildOutputCanvas() {
      const frame   = document.getElementById('frame');
      const maskImg = document.getElementById('maskImg');
      const photoImg = document.getElementById('photoImg');
      const FW = 270, FH = 400;
      const OUTPUT_W = 540, OUTPUT_H = 800;
      const SCALE = OUTPUT_W / FW;
      const cv = document.createElement('canvas');
      cv.width  = OUTPUT_W;
      cv.height = OUTPUT_H;
      const ctx = cv.getContext('2d');
      ctx.scale(SCALE, SCALE);

      const frameRect = frame.getBoundingClientRect();
      const scaleX = FW / frameRect.width;
      const scaleY = FH / frameRect.height;
      const geomScale = Math.min(scaleX, scaleY);

      // 1. 白底
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, FW, FH);

      // 2. 用户照片（按 photoContainer 位置，使用 cover 裁切 + 用户变换）
      if (photoImg.naturalWidth) {
        const pc = document.getElementById('photoContainer');
        const pcr = pc.getBoundingClientRect();
        const dx = (pcr.left - frameRect.left) * scaleX;
        const dy = (pcr.top  - frameRect.top) * scaleY;
        const dw = pcr.width * scaleX;
        const dh = pcr.height * scaleY;
        try { drawImageWithTransform(ctx, photoImg, dx, dy, dw, dh); } catch(_) {}
      }

      // 3. 遮罩
      if (maskImg.naturalWidth) {
        try { ctx.drawImage(maskImg, 0, 0, FW, FH); } catch(_) {}
      }

      // 4. 文字层（逐字符按 getBoundingClientRect 绘制）
      frame.querySelectorAll('.text-layer').forEach(layer => {
        if (layer.style.display === 'none') return;
        const sp = layer.firstElementChild;
        if (!sp || !sp.textContent.trim()) return;

        const lr = layer.getBoundingClientRect();
        const lx = (lr.left - frameRect.left) * scaleX;
        const ly = (lr.top  - frameRect.top) * scaleY;
        const lw = lr.width * scaleX;
        const lh = lr.height * scaleY;
        const cs = getComputedStyle(layer);

        ctx.save();
        // 旋转
        const mat = cs.transform;
        if (mat && mat !== 'none') {
          const m = mat.match(/matrix\(([^)]+)\)/);
          if (m) {
            const vals = m[1].split(',').map(Number);
            const angle = Math.atan2(vals[1], vals[0]);
            if (Math.abs(angle) > 0.001) {
              const cx = lx + lw/2, cy = ly + lh/2;
              ctx.translate(cx, cy); ctx.rotate(angle); ctx.translate(-cx, -cy);
            }
          }
        }
        // 背景色
        const bgColor = cs.backgroundColor;
        if (bgColor && bgColor !== 'rgba(0, 0, 0, 0)' && bgColor !== 'transparent') {
          const r = (parseFloat(cs.borderRadius) || 0) * geomScale;
          ctx.fillStyle = bgColor;
          ctx.beginPath();
          ctx.roundRect ? ctx.roundRect(lx, ly, lw, lh, r) : ctx.rect(lx, ly, lw, lh);
          ctx.fill();
        }
        // clip
        ctx.beginPath();
        ctx.rect(lx, ly, lw, lh);
        ctx.clip();
        // 逐字绘制
        const fontSize  = (parseFloat(cs.fontSize) || 20) * geomScale;
        const color     = cs.color || '#111111';
        const fontFamily = cs.fontFamily || 'sans-serif';
        const sw2 = (parseFloat(cs.webkitTextStrokeWidth) || 0) * geomScale;
        const sc  = cs.webkitTextStrokeColor || '#000000';
        ctx.font = `${fontSize}px ${fontFamily}`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = color;
        const textNode = sp.firstChild || sp;
        const text = sp.textContent;
        const range = document.createRange();
        for (let i = 0; i < text.length; i++) {
          range.setStart(sp.firstChild || sp, i);
          range.setEnd(sp.firstChild || sp, i+1);
          const cr = range.getBoundingClientRect();
          const cx = (cr.left - frameRect.left + cr.width / 2) * scaleX;
          const cy = (cr.top  - frameRect.top  + cr.height / 2) * scaleY;
          if (sw2 > 0) {
            ctx.save();
            ctx.strokeStyle = sc; ctx.lineWidth = sw2*2; ctx.lineJoin = 'round';
            ctx.strokeText(text[i], cx, cy);
            ctx.restore();
          }
          ctx.fillText(text[i], cx, cy);
        }
        ctx.restore();
      });

      return cv;
    }

    function buildImageBlob() {
      return new Promise((resolve, reject) => {
        try {
          const sourceCanvas = buildOutputCanvas();
          const scaledCanvas = document.createElement('canvas');
          scaledCanvas.width = 540;
          scaledCanvas.height = 800;
          const sctx = scaledCanvas.getContext('2d');
          sctx.drawImage(sourceCanvas, 0, 0, 540, 800);
          scaledCanvas.toBlob(blob => {
            if (!blob) {
              reject(new Error('图片生成失败'));
              return;
            }
            resolve(blob);
          }, 'image/png');
        } catch (err) {
          reject(err);
        }
      });
    }

    function buildPhotoOnlyBlob() {
      return new Promise((resolve, reject) => {
        try {
          const FW = 540, FH = 800;
          const cv = document.createElement('canvas');
          cv.width = FW;
          cv.height = FH;
          const ctx = cv.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, FW, FH);

          if (photoImg.naturalWidth) {
            const sample = templateConfig?.sample || { x: 0, y: 0, w: 270, h: 400 };
            const dx = (sample.x || 0) * 2;
            const dy = (sample.y || 0) * 2;
            const dw = (sample.w || 270) * 2;
            const dh = (sample.h || 400) * 2;
            drawImageWithTransform(ctx, photoImg, dx, dy, dw, dh);
          }

          cv.toBlob(blob => {
            if (!blob) {
              reject(new Error('仅照片图片生成失败'));
              return;
            }
            resolve(blob);
          }, 'image/png');
        } catch (err) {
          reject(err);
        }
      });
    }

    function buildOverlayOnlyBlob() {
      return new Promise((resolve, reject) => {
        try {
          const sourceCanvas = buildOutputCanvas();
          const cv = document.createElement('canvas');
          cv.width = 540;
          cv.height = 800;
          const ctx = cv.getContext('2d');

          // 保持透明背景，只绘制遮罩和文字
          if (maskImg.naturalWidth) {
            ctx.drawImage(maskImg, 0, 0, 540, 800);
          }

          frame.querySelectorAll('.text-layer').forEach(layer => {
            if (layer.style.display === 'none') return;
            const sp = layer.firstElementChild;
            if (!sp || !sp.textContent.trim()) return;

            const frameRect = frame.getBoundingClientRect();
            const scaleX = 270 / frameRect.width;
            const scaleY = 400 / frameRect.height;
            const geomScale = Math.min(scaleX, scaleY);
            const lr = layer.getBoundingClientRect();
            const lx = (lr.left - frameRect.left) * scaleX * 2;
            const ly = (lr.top - frameRect.top) * scaleY * 2;
            const lw = lr.width * scaleX * 2;
            const lh = lr.height * scaleY * 2;
            const cs = getComputedStyle(layer);

            ctx.save();
            const mat = cs.transform;
            if (mat && mat !== 'none') {
              const m = mat.match(/matrix\(([^)]+)\)/);
              if (m) {
                const vals = m[1].split(',').map(Number);
                const angle = Math.atan2(vals[1], vals[0]);
                if (Math.abs(angle) > 0.001) {
                  const cx = lx + lw / 2, cy = ly + lh / 2;
                  ctx.translate(cx, cy);
                  ctx.rotate(angle);
                  ctx.translate(-cx, -cy);
                }
              }
            }

            const bgColor = cs.backgroundColor;
            if (bgColor && bgColor !== 'rgba(0, 0, 0, 0)' && bgColor !== 'transparent') {
              const r = (parseFloat(cs.borderRadius) || 0) * geomScale * 2;
              ctx.fillStyle = bgColor;
              ctx.beginPath();
              ctx.roundRect ? ctx.roundRect(lx, ly, lw, lh, r) : ctx.rect(lx, ly, lw, lh);
              ctx.fill();
            }

            ctx.beginPath();
            ctx.rect(lx, ly, lw, lh);
            ctx.clip();

            const fontSize = (parseFloat(cs.fontSize) || 20) * geomScale * 2;
            const color = cs.color || '#111111';
            const fontFamily = cs.fontFamily || 'sans-serif';
            const sw2 = (parseFloat(cs.webkitTextStrokeWidth) || 0) * geomScale * 2;
            const sc = cs.webkitTextStrokeColor || '#000000';
            ctx.font = `${fontSize}px ${fontFamily}`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = color;

            const text = sp.textContent;
            const range = document.createRange();
            for (let i = 0; i < text.length; i++) {
              range.setStart(sp.firstChild || sp, i);
              range.setEnd(sp.firstChild || sp, i + 1);
              const cr = range.getBoundingClientRect();
              const cx = (cr.left - frameRect.left + cr.width / 2) * scaleX * 2;
              const cy = (cr.top - frameRect.top + cr.height / 2) * scaleY * 2;
              if (sw2 > 0) {
                ctx.save();
                ctx.strokeStyle = sc;
                ctx.lineWidth = sw2 * 2;
                ctx.lineJoin = 'round';
                ctx.strokeText(text[i], cx, cy);
                ctx.restore();
              }
              ctx.fillText(text[i], cx, cy);
            }
            ctx.restore();
          });

          cv.toBlob(blob => {
            if (!blob) {
              reject(new Error('仅遮罩和文字图片生成失败'));
              return;
            }
            resolve(blob);
          }, 'image/png');
        } catch (err) {
          reject(err);
        }
      });
    }

    // ── 刷新抖动预览 ───────────────────────────────────────
    function refreshDitherPreviews() {
      if (!ditheredPreviewBox.classList.contains('show')) return;
      const ditheredCanvas = buildDitheredPhotoCanvas();
      ditheredPreviewCanvas.width = ditheredCanvas.width;
      ditheredPreviewCanvas.height = ditheredCanvas.height;
      const dctx = ditheredPreviewCanvas.getContext('2d');
      dctx.drawImage(ditheredCanvas, 0, 0);

      // 合成：抖动底层 + 遮罩文字顶层
      if (compositeSmallPreviewBox.classList.contains('show')) {
        compositeSmallCanvas.width = 270;
        compositeSmallCanvas.height = 400;
        const cctx = compositeSmallCanvas.getContext('2d');
        cctx.drawImage(ditheredCanvas, 0, 0);
        cctx.drawImage(overlayScaledCanvas, 0, 0);
      }

    }

    // ── 抖动处理（与 index.html 一致）──────────────────────────
    function buildDitheredPhotoCanvas() {
      const FW = 270, FH = 400;
      // 先绘制仅照片内容到 270×400
      const cv = document.createElement('canvas');
      cv.width = FW;
      cv.height = FH;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, FW, FH);

      // 使用原始照片，保留原始 RGB 直接交给 TriColorConverter
      const drawSrc = sourcePhotoImg || photoImg;
      if (drawSrc && (drawSrc.naturalWidth || drawSrc.width)) {
        const sample = templateConfig?.sample || { x: 0, y: 0, w: 270, h: 400 };
        const dx = sample.x || 0;
        const dy = sample.y || 0;
        const dw = sample.w || 270;
        const dh = sample.h || 400;
        drawImageWithTransform(ctx, drawSrc, dx, dy, dw, dh);
      }

      // 使用 TriColorConverter 进行抖动
      const tcConfig = (currentPhotoFilter === 'bwred') ? {
        bwThreshold: parseInt(document.getElementById('tcBwThreshold').value),
        gamma: parseInt(document.getElementById('tcGamma').value) / 100,
        autoLevelsPercent: parseInt(document.getElementById('tcAutoLevelsSlider').value) / 10,
        autoLevels: document.getElementById('tcAutoLevels').checked,
        satThreshold: parseInt(document.getElementById('tcSatThreshold').value) / 100,
        valThreshold: parseInt(document.getElementById('tcValThreshold').value) / 100,
        redDelta: parseInt(document.getElementById('tcRedDelta').value),
        hueWidth: parseInt(document.getElementById('tcHueWidth').value) / 100,
        redDither: document.getElementById('tcRedDither').checked,
        redThreshold: parseInt(document.getElementById('tcRedThreshold').value),
        redBoost: parseInt(document.getElementById('tcRedBoost').value) / 10,
        serpentine: true,
      } : {
        bwThreshold: 120,
        gamma: 0.9,
        autoLevelsPercent: 1.5,
        autoLevels: true,
        satThreshold: 0.4,
        valThreshold: 0.2,
        redDelta: 50,
        hueWidth: 0.06,
        redDither: true,
        redThreshold: 100,
        redBoost: 1.5,
        serpentine: true,
      };
      const converter = new TriColorConverter(tcConfig);

      const result = converter.convert(cv);

      // 红色模式：黑像素变红 → 只有红+白
      // bwred 模式：保留黑+红+白三色不变
      if (currentPhotoFilter === 'red') {
        const rctx = result.getContext('2d');
        const rd = rctx.getImageData(0, 0, result.width, result.height);
        const px = rd.data;
        for (let i = 0; i < px.length; i += 4) {
          if (px[i] === 0 && px[i+1] === 0 && px[i+2] === 0) {
            px[i] = 255; px[i+1] = 0; px[i+2] = 0;
          }
        }
        rctx.putImageData(rd, 0, 0);
      }

      return result;
    }



    // ── 录音 ─────────────────────────────────────────────────
    const btnRecord       = document.getElementById('btnRecord');
    const recordProgress  = document.getElementById('recordProgress');
    const recordProgressBar = document.getElementById('recordProgressBar');
    const recordTimer     = document.getElementById('recordTimer');
    const recordedAudio   = document.getElementById('recordedAudio');
    let mediaRecorder = null, recordedChunks = [], lastRecordedBlob = null;
    let recordingTimer = null, recordingStartTime = null;
    const MAX_RECORD_TIME = 10000;

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        recordedChunks = [];
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          if (recordedChunks.length > 0) {
            const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
            lastRecordedBlob = blob;
            const url = URL.createObjectURL(blob);
            recordedAudio.src = url;
            recordedAudio.onloadeddata = () => recordedAudio.play().catch(() => {});
          }
        };
        mediaRecorder.start(100);
        recordingStartTime = Date.now();
        btnRecord.classList.add('recording');
        recordProgress.classList.add('show');
        updateRecordProgress();
        recordingTimer = setTimeout(stopRecording, MAX_RECORD_TIME);
      } catch { alert('无法访问麦克风，请检查权限设置'); }
    }
    function updateRecordProgress() {
      if (!recordingStartTime || !mediaRecorder || mediaRecorder.state !== 'recording') return;
      const elapsed = Date.now() - recordingStartTime;
      const remaining = Math.max(0, MAX_RECORD_TIME - elapsed);
      recordProgressBar.style.width = (remaining / MAX_RECORD_TIME * 100) + '%';
      recordTimer.textContent = Math.ceil(remaining / 1000);
      if (remaining > 0) requestAnimationFrame(updateRecordProgress);
    }
    function stopRecording() {
      if (recordingTimer) { clearTimeout(recordingTimer); recordingTimer = null; }
      if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
      btnRecord.classList.remove('recording');
      recordProgress.classList.remove('show');
      recordProgressBar.style.width = '100%';
      recordTimer.textContent = '10';
      recordingStartTime = null;
    }
    btnRecord.addEventListener('pointerdown', e => { e.preventDefault(); startRecording(); });
    btnRecord.addEventListener('pointerup',   e => { e.preventDefault(); stopRecording();  });
    btnRecord.addEventListener('pointerleave', () => { if (mediaRecorder?.state === 'recording') stopRecording(); });
    btnRecord.addEventListener('pointercancel',() => { if (mediaRecorder?.state === 'recording') stopRecording(); });

    // ── 发送祝福 ─────────────────────────────────────────────
    function runServerLogs(htmlText) {
      if (!htmlText || !htmlText.includes('<script>')) return;
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.srcdoc = htmlText;
      document.body.appendChild(iframe);
      setTimeout(() => iframe.remove(), 1500);
    }
    function extractPlainText(htmlText) {
      if (!htmlText || !htmlText.includes('<')) return (htmlText || '').trim();
      const doc = new DOMParser().parseFromString(htmlText, 'text/html');
      return (doc.body ? doc.body.textContent : htmlText).trim();
    }

    async function uploadBlessing() {
      // 提取设备参数
      const fullUrl = window.location.href;
      const match = fullUrl.match(/[?&](\d{4}[A-Za-z0-9]{9}[A-Za-z0-9]{8})(?:&|$)/);
      let deviceParam = match ? match[1] : '';
      if (!deviceParam) {
        const hashMatch = (window.location.hash || '').match(/(\d{4}[A-Za-z0-9]{9}[A-Za-z0-9]{8})/);
        if (hashMatch) deviceParam = hashMatch[1];
      }
      if (!deviceParam) { alert('URL 缺少设备参数，无法发送祝福。'); return false; }

      const sendCanvas = document.createElement('canvas');
      sendCanvas.width = 270;
      sendCanvas.height = 400;
      const sctx = sendCanvas.getContext('2d');
      sctx.drawImage(ditheredPreviewCanvas, 0, 0);
      sctx.drawImage(overlayScaledCanvas, 0, 0);

      const sendBlob = await new Promise((resolve, reject) => {
        sendCanvas.toBlob(blob => {
          if (!blob) reject(new Error('合成图生成失败'));
          else resolve(blob);
        }, 'image/png');
      });
      const formData = new FormData();
      formData.append('image', sendBlob, 'capture.png');
      if (lastRecordedBlob) formData.append('audio', lastRecordedBlob, 'record.wav');
      formData.append('mode', 'compose');
      const bg = urlParams.get('bg');
      if (bg) formData.append('bg_path', bg);

      const response = await fetch(`../up.php?${deviceParam}`, { method: 'POST', body: formData });
      const text = await response.text();
      runServerLogs(text);
      if (!response.ok) throw new Error(extractPlainText(text) || '上传失败');
      return true;
    }

    document.getElementById('btnSendBlessing').addEventListener('click', async () => {
      const btn = document.getElementById('btnSendBlessing');
      btn.disabled = true;
      btn.textContent = '发送中...';
      try {
        await uploadBlessing();
        document.querySelector('.wrap').style.display = 'none';
        document.getElementById('sendSuccessOverlay').classList.add('show');
      } catch (error) {
        alert(error.message || '上传失败');
      } finally {
        btn.disabled = false;
        btn.textContent = '发送祝福';
      }
    });

    // 预请求麦克风权限
    if (navigator.mediaDevices?.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => stream.getTracks().forEach(t => t.stop()))
        .catch(() => {});
    }
  </script>
