<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>祝福牌 · 灵语双列楷</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121826;
      --text: #e6edf3;
      --muted: #9aa4b2;
      --border: rgba(255,255,255,0.10);
      --btn: #1f6feb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      padding: 12px;
      max-width: 920px;
      margin: 0 auto;
    }

    .publish-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }
    .tmpl-name-input {
      flex: 1;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--text);
      padding: 9px 12px;
      font-size: 15px;
      outline: none;
    }
    .tmpl-name-input:focus {
      border-color: rgba(31,111,235,.7);
      box-shadow: 0 0 0 3px rgba(31,111,235,.2);
    }
    #publishBtn {
      flex: none;
      padding: 9px 18px;
      border: 0;
      border-radius: 10px;
      background: var(--btn);
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity .15s;
    }
    #publishBtn:disabled { opacity: .5; cursor: default; }
    #changeBgBtn {
      flex: none;
      padding: 9px 14px;
      border: 0;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background .15s;
    }
    #changeBgBtn:hover {
      background: rgba(255,255,255,0.15);
    }

    .frame {
      margin-top: 6px;
      width: 100%;
      aspect-ratio: 270 / 400;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      user-select: none;
    }
    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 文字叠层 */
    .text-layer {
      position: absolute;
      z-index: 10;
      font-size: 28px;
      line-height: 1.3;
      white-space: pre-wrap;
      word-break: break-word;
      pointer-events: none;
      display: none;
      padding: 0;
      border: 1px dashed rgba(59,130,246,0.7);
      overflow: hidden;
      /* flex 居中 */
      justify-content: center;
      align-items: center;
      text-align: center;
      paint-order: stroke fill;
    }

    /* 输入组 */
    .field-card {
      margin-top: 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .field-card .field-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .field-card .field-title .limit {
      font-size: 11px;
      color: #555;
      font-weight: 400;
      margin-left: 4px;
    }
    .field-card input[type="text"],
    .field-card input[type="date"],
    .field-card select {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 10px 12px;
      font-size: 16px;
      line-height: 1.3;
      outline: none;
    }
    .field-card select option {
      background: #fff;
      color: #111;
    }
    .field-card input:focus,
    .field-card select:focus {
      border-color: rgba(31,111,235,0.7);
      box-shadow: 0 0 0 3px rgba(31,111,235,0.2);
    }
    .field-card input::placeholder {
      color: #555;
    }

    .settings-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .settings-row select {
      flex: 1;
      min-width: 100px;
    }
    .settings-row input[type="number"] {
      width: 68px;
      flex: none;
    }
    .settings-row .spacing-label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      align-self: center;
    }

    .xywh-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .xywh-row label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .xywh-row input[type="number"] {
      width: 58px;
      flex: none;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 6px 8px;
      font-size: 14px;
      outline: none;
    }
    .xywh-row input:focus {
      border-color: rgba(31,111,235,0.7);
      box-shadow: 0 0 0 3px rgba(31,111,235,0.2);
    }

    .align-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .align-row label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .align-row select {
      flex: 1;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 6px 8px;
      font-size: 13px;
      outline: none;
    }
    .align-row select:focus {
      border-color: rgba(31,111,235,0.7);
      box-shadow: 0 0 0 3px rgba(31,111,235,0.2);
    }

    .dir-row {
      display: flex;
      gap: 6px;
    }
    .dir-row button {
      flex: 1;
      padding: 8px 0;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      border: 2px solid transparent;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
    }
    .dir-row button.active {
      border-color: var(--btn);
    }

    .rotate-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .rotate-row label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .rotate-row input[type="number"] {
      width: 72px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 6px 8px;
      font-size: 14px;
      outline: none;
    }
    .rotate-row input:focus {
      border-color: rgba(31,111,235,0.7);
      box-shadow: 0 0 0 3px rgba(31,111,235,0.2);
    }
    .rotate-row span {
      font-size: 12px;
      color: var(--muted);
    }

    .stroke-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .stroke-row label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .stroke-row input[type="number"] {
      width: 62px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 6px 8px;
      font-size: 14px;
      outline: none;
    }
    .stroke-row select {
      flex: 1;
      min-width: 60px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 6px 8px;
      font-size: 13px;
      outline: none;
    }
    .stroke-row select option {
      background: #fff;
      color: #111;
    }
    .stroke-row input:focus,
    .stroke-row select:focus {
      border-color: rgba(31,111,235,0.7);
      box-shadow: 0 0 0 3px rgba(31,111,235,0.2);
    }
    .stroke-row span {
      font-size: 12px;
      color: var(--muted);
    }

    .radius-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .radius-row label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .radius-row input {
      width: 60px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
    }
    .radius-row input:focus {
      border-color: rgba(31,111,235,0.7);
      box-shadow: 0 0 0 3px rgba(31,111,235,0.2);
    }
    .radius-row span {
      font-size: 12px;
      color: var(--muted);
    }

    .charlimit-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .charlimit-row label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .charlimit-row input[type="number"] {
      width: 58px;
      flex: none;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 6px 8px;
      font-size: 14px;
      outline: none;
    }
    .charlimit-row input:focus {
      border-color: rgba(31,111,235,0.7);
      box-shadow: 0 0 0 3px rgba(31,111,235,0.2);
    }
    .charlimit-row span {
      font-size: 12px;
      color: var(--muted);
    }

    .color-row {
      display: flex;
      gap: 6px;
    }
    .color-row button {
      flex: 1;
      padding: 8px 0;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
    }
    .color-row button.active {
      border-color: var(--btn);
    }
    .color-btn-black { background: #111; color: #fff; }
    .color-btn-red   { background: #d1242f; color: #fff; }
    .color-btn-white  { background: #fff; color: #111; }

    .bgc-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .bgc-row .bgc-label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .bgc-row button {
      flex: 1;
      padding: 8px 0;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
    }
    .bgc-row button.active {
      border-color: var(--btn);
    }
    .bgc-btn-none  { background: linear-gradient(135deg,#eee 40%,#ccc 60%); color: #666; }
    .bgc-btn-black { background: #111; color: #fff; }
    .bgc-btn-red   { background: #d1242f; color: #fff; }
    .bgc-btn-white { background: #fff; color: #111; }

    button.preview-btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 14px;
      background: var(--btn);
      color: white;
      cursor: pointer;
      align-self: flex-start;
    }
    .btn-loading {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .field-status {
      font-size: 12px;
      color: var(--muted);
    }

    .url-param {
      color: #666;
      font-size: 13px;
      line-height: 1.2;
      word-break: break-all;
      margin-bottom: 6px;
      text-align: center;
    }

    /* 加载遮罩 */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      place-items: center;
      z-index: 999;
      padding: 16px;
    }
    .overlay.show {
      display: grid;
    }
    .overlay-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      width: min(90vw, 360px);
      color: var(--text);
      text-align: center;
    }
    .overlay-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .overlay-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      margin-bottom: 10px;
    }
    .overlay-bar > span {
      display: block;
      height: 100%;
      width: 45%;
      background: var(--btn);
      border-radius: inherit;
      animation: loadingBar 1.2s ease-in-out infinite;
    }
    @keyframes loadingBar {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(80%); }
      100% { transform: translateX(220%); }
    }
    .overlay-hint {
      font-size: 12px;
      color: var(--muted);
    }

    /* 发布弹窗 */
    .publish-modal-card { text-align: left; }
    .modal-field { margin-bottom: 12px; }
    .modal-field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .modal-field input, .modal-field select {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
    }
    .modal-field input:focus, .modal-field select:focus {
      border-color: rgba(31,111,235,.7);
      box-shadow: 0 0 0 3px rgba(31,111,235,.2);
    }
    .modal-field select option { background: var(--panel); }
    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .modal-actions button {
      flex: 1;
      padding: 9px 0;
      border: 0;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .modal-btn-cancel  { background: rgba(255,255,255,0.08); color: var(--text); }
    .modal-btn-save-as { background: rgba(255,255,255,0.12); color: var(--text); }
    .modal-btn-confirm { background: var(--btn); color: #fff; }

    .jump-bar {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .jump-bar button {
      flex: 1;
      padding: 9px 0;
      font-size: 13px;
      font-weight: 600;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .jump-bar button:hover {
      border-color: var(--btn);
      color: var(--text);
    }
    .jump-bar button.active {
      border-color: var(--btn);
      color: var(--text);
      background: rgba(31,111,235,0.12);
    }
    /* 虚线切换按钮：固定宽度，不参与 flex:1 平分 */
    #dashedBtn {
      flex: none;
      padding: 9px 14px;
    }
    /* 隐藏虚线状态 */
    .frame.dashes-hidden .text-layer {
      border-color: transparent;
    }
  </style>
  <script defer src="../../lib/full.js"></script>
</head>
<body>
  <div class="wrap">
    <div id="urlParam" class="url-param"></div>
    <div class="publish-bar">
      <button type="button" id="changeBgBtn">换背景</button>
      <input type="file" id="bgFileInput" accept="image/*" style="display:none" />
      <input type="text" id="tmplName" class="tmpl-name-input" placeholder="模板名称" />
      <button type="button" id="publishBtn">发布</button>
    </div>
    <div class="frame" id="frame">
      <div id="layer_to" class="text-layer"></div>
      <div id="layer_msg" class="text-layer"></div>
      <div id="layer_from" class="text-layer"></div>
      <div id="layer_date" class="text-layer"></div>
      <img id="preview" src="p31.png" alt="模板预览" />
    </div>

    <!-- 快捷跳转栏 -->
    <div class="jump-bar">
      <button type="button" data-target="layer_to">祝福给</button>
      <button type="button" data-target="layer_msg">祝福语</button>
      <button type="button" data-target="layer_from">送祝福人</button>
      <button type="button" data-target="layer_date">时间</button>
      <button type="button" id="dashedBtn" title="切换虚线显示">虚线</button>
    </div>
    <div class="field-card" data-layer="layer_to" data-x="10" data-y="10" data-w="250" data-h="50">
      <div class="field-title">祝福给</div>
      <input type="text" class="field-input" placeholder="收件人名字" />
      <div class="charlimit-row">
        <label>最少</label><input type="number" class="field-min-len" value="1" min="0" max="999" step="1" /><span>字</span>
        <label>最多</label><input type="number" class="field-max-len" value="5" min="0" max="999" step="1" /><span>字</span>
      </div>
      <div class="xywh-row">
        <label>X</label><input type="number" class="field-x" value="10" min="0" max="270" step="1" />
        <label>Y</label><input type="number" class="field-y" value="10" min="0" max="400" step="1" />
        <label>W</label><input type="number" class="field-w" value="250" min="10" max="270" step="1" />
        <label>H</label><input type="number" class="field-h" value="50" min="10" max="400" step="1" />
      </div>
      <div class="align-row">
        <label>横轴</label>
        <select class="field-align-h">
          <option value="flex-start">左</option>
          <option value="center" selected>居中</option>
          <option value="flex-end">右</option>
        </select>
        <label>纵轴</label>
        <select class="field-align-v">
          <option value="flex-start">上</option>
          <option value="center" selected>居中</option>
          <option value="flex-end">下</option>
        </select>
      </div>
      <div class="settings-row">
        <select class="field-font">
          <option value="default">默认字体</option>
          <option value="AlimamaDaoLiTi">刀隶体</option>
          <option value="AlimamaDongFangDaKai" selected>东方大楷</option>
          <option value="AlimamaShuHeiTi">数黑体</option>
          <option value="DingTalkJinBuTi">进步体</option>
          <option value="TaoBaoMaiCaiTi">买菜体</option>
          <option value="SotyrFangsong-Regular">长宋体</option>
          <option value="bfs">美仿宋</option>
          <option value="MasaFont-Bold">衡山毛笔</option>
          <option value="bzt">碑筆体</option>
          <option value="sys">思源宋</option>
          <option value="syh">思源黑</option>
          <option value="sxt">手写体</option>
          <option value="fbzd">飞波正点</option>
          <option value="hot">海鸥体</option>
          <option value="kkct">可可体</option>
          <option value="yfxy">余繁新语</option>
          <option value="lhls">临海隶属</option>
        </select>
        <input type="number" class="field-size" value="28" min="1" max="200" step="1" />          <span class="spacing-label">字距</span>
          <input type="number" class="field-spacing" value="0" min="-100" max="100" step="1" />          <span class="spacing-label">行距</span>
          <input type="number" class="field-line-spacing" value="1.3" min="0.1" max="10" step="0.1" />      </div>
      <div class="color-row">
        <button type="button" class="color-btn-black active" data-color="#111111">黑</button>
        <button type="button" class="color-btn-red" data-color="#d1242f">红</button>
        <button type="button" class="color-btn-white" data-color="#ffffff">白</button>
      </div>
      <div class="bgc-row">
        <span class="bgc-label">背景</span>
        <button type="button" class="bgc-btn-none active" data-bgc="transparent">无</button>
        <button type="button" class="bgc-btn-black" data-bgc="#111111">黑</button>
        <button type="button" class="bgc-btn-red" data-bgc="#d1242f">红</button>
        <button type="button" class="bgc-btn-white" data-bgc="#ffffff">白</button>
      </div>
      <div class="dir-row">
        <button type="button" class="active" data-dir="h">横排</button>
        <button type="button" data-dir="v">竖排</button>
      </div>
      <div class="rotate-row">
        <label>旋转</label><input type="number" class="field-rotate" value="0" min="-180" max="180" step="1" /><span>°</span>
      </div>
      <div class="stroke-row">
        <label>描边</label><input type="number" class="field-stroke-w" value="0" min="0" max="10" step="0.5" /><span>px</span>
        <select class="field-stroke-c"><option value="#000000" selected>黑</option><option value="#d1242f">红</option><option value="#ffffff">白</option></select>
      </div>
      <div class="radius-row">
        <label>圆角</label><input type="number" class="field-radius" value="0" min="0" max="100" step="1" /><span>px</span>
      </div>
      <button type="button" class="preview-btn">预览</button>
      <div class="field-status"></div>
    </div>

    <!-- 祝福语 -->
    <div class="field-card" data-layer="layer_msg" data-x="10" data-y="80" data-w="250" data-h="200">
      <div class="field-title">祝福语</div>
      <input type="text" class="field-input" placeholder="写一句祝福语" />
      <div class="charlimit-row">
        <label>最少</label><input type="number" class="field-min-len" value="1" min="0" max="999" step="1" /><span>字</span>
        <label>最多</label><input type="number" class="field-max-len" value="15" min="0" max="999" step="1" /><span>字</span>
      </div>
      <div class="xywh-row">
        <label>X</label><input type="number" class="field-x" value="10" min="0" max="270" step="1" />
        <label>Y</label><input type="number" class="field-y" value="80" min="0" max="400" step="1" />
        <label>W</label><input type="number" class="field-w" value="250" min="10" max="270" step="1" />
        <label>H</label><input type="number" class="field-h" value="200" min="10" max="400" step="1" />

  <script>
    const FONT_API = '../../font/dfont.php';
    const loadingOverlay = document.getElementById('loadingOverlay');

    // 换背景按钮
    (function () {
      const changeBgBtn = document.getElementById('changeBgBtn');
      const bgFileInput = document.getElementById('bgFileInput');
      const preview = document.getElementById('preview');
      changeBgBtn.addEventListener('click', () => bgFileInput.click());
      bgFileInput.addEventListener('change', () => {

        preview.src = url;

    })();

    // 虚线切换按钮
    (function () {
      const frame = document.getElementById('frame');
      document.getElementById('dashedBtn').addEventListener('click', () => {
        frame.classList.toggle('dashes-hidden');
      });
    })();

    // 快捷跳转按钮：点击后将对应 field-card 移到列表最前，并高亮按钮
    (function () {
      const jumpBtns = document.querySelectorAll('.jump-bar button[data-target]');
      const wrap = document.querySelector('.wrap');

      jumpBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const targetLayer = btn.dataset.target;
          const card = wrap.querySelector(`.field-card[data-layer="${targetLayer}"]`);
          if (!card) return;

          // 高亮按钮
          jumpBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          // 将该 card 移到 wrap 内所有 field-card 的最前面
          const firstCard = wrap.querySelector('.field-card');
          if (firstCard && card !== firstCard) {
            wrap.insertBefore(card, firstCard);
          }

          // 滚动到该 card
          card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
    })();

    // ── Canvas 自绘缩略图（仿 index.html captureFrame 方案）───────
    // 核心思路：直接从 DOM 读取 layer 的 computedStyle / boundingRect，
    // 不做任何手动坐标换算——浏览器怎么排版就怎么画。
    async function buildThumbCanvas() {
      function _rrect(ctx, x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y,     x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x,     y + h, r);
        ctx.arcTo(x,     y + h, x,     y,     r);
        ctx.arcTo(x,     y,     x + w, y,     r);
        ctx.closePath();
      }
      const frame = document.getElementById('frame');
      const bgImg = document.getElementById('preview');
      // 以 <img> 的实际渲染区域为基准，避免 frame border 导致的偏移
      const imgR = bgImg.getBoundingClientRect();
      const FW = imgR.width;
      const FH = imgR.height;
      const SCALE = 2;

      const cv = document.createElement('canvas');
      cv.width  = FW * SCALE;
      cv.height = FH * SCALE;
      const ctx = cv.getContext('2d');
      ctx.scale(SCALE, SCALE);

      // 背景图
      if (bgImg && bgImg.naturalWidth > 0) {
        try { ctx.drawImage(bgImg, 0, 0, FW, FH); } catch (_) {}
      }

      // 各文字图层——用 Range API 逐字读取 DOM 实际渲染位置，彻底避免手动排版
      for (const lid of ['layer_to', 'layer_msg', 'layer_from', 'layer_date']) {
        const layer = document.getElementById(lid);
        if (!layer || layer.style.display === 'none') continue;
        const textNode = layer.firstChild;
        if (!textNode || textNode.nodeType !== Node.TEXT_NODE) continue;
        const text = textNode.textContent;
        if (!text.trim()) continue;

        const lr = layer.getBoundingClientRect();
        const lx = lr.left - imgR.left;
        const ly = lr.top  - imgR.top;
        const lw = lr.width;
        const lh = lr.height;

        const cs = getComputedStyle(layer);
        const fontSize  = parseFloat(cs.fontSize)    || 28;
        const color     = cs.color                   || '#111111';
        const bgColor   = cs.backgroundColor;
        const fontFamily = cs.fontFamily             || 'sans-serif';
        const borderRad = parseFloat(cs.borderRadius) || 0;
        const strokeW   = parseFloat(cs.webkitTextStrokeWidth) || 0;
        const strokeC   = cs.webkitTextStrokeColor   || '#000000';
        const transform = cs.transform;

        ctx.save();

        // 旋转
        if (transform && transform !== 'none') {
          const m = transform.match(/matrix\(([^)]+)\)/);
          if (m) {
            const vals = m[1].split(',').map(Number);
            const angle = Math.atan2(vals[1], vals[0]);
            if (Math.abs(angle) > 0.001) {
              const cx = lx + lw / 2, cy = ly + lh / 2;
              ctx.translate(cx, cy);
              ctx.rotate(angle);
              ctx.translate(-cx, -cy);
            }
          }
        }

        // 背景色
        if (bgColor && bgColor !== 'rgba(0, 0, 0, 0)' && bgColor !== 'transparent') {
          ctx.fillStyle = bgColor;
          _rrect(ctx, lx, ly, lw, lh, borderRad);
          ctx.fill();
        }

        // 裁剪
        _rrect(ctx, lx, ly, lw, lh, borderRad);
        ctx.clip();

        ctx.font = `${fontSize}px ${fontFamily}`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = color;

        // 逐字读取 DOM 实际渲染坐标，用字符中心点对齐（消除字形宽度差异导致的偏移）
        const range = document.createRange();
        for (let i = 0; i < textNode.length; i++) {
          const ch = text[i];
          range.setStart(textNode, i);
          range.setEnd(textNode, i + 1);
          const cr = range.getBoundingClientRect();
          const cx = cr.left - imgR.left + cr.width / 2;
          const cy = cr.top  - imgR.top  + cr.height / 2;

          if (strokeW > 0) {
            ctx.save();
            ctx.strokeStyle = strokeC;
            ctx.lineWidth = strokeW * 2;
            ctx.lineJoin = 'round';
            ctx.strokeText(ch, cx, cy);
            ctx.restore();
          }
          ctx.fillText(ch, cx, cy);
        }

        ctx.restore();
      }
      return cv;
    }

    // ── 发布弹窗 ─────────────────────────────────────────────────
    (function () {
      const _params      = new URLSearchParams(window.location.search);
      const urlTemplateId = _params.get('template_id') || '';
      const isEditing    = !!urlTemplateId;

      const modal           = document.getElementById('publishModal');
      const modalTplName    = document.getElementById('modalTplName');
      const modalTplType    = document.getElementById('modalTplType');
      const modalConfirmBtn = document.getElementById('modalConfirmBtn');
      const modalSaveAsBtn  = document.getElementById('modalSaveAsBtn');
      const modalCancelBtn  = document.getElementById('modalCancelBtn');

      // 新建模板时隐藏"另存为"
      if (!isEditing) modalSaveAsBtn.style.display = 'none';

      // 懒加载分类列表
      let _typesLoaded = false;
      async function loadTypes() {
        if (_typesLoaded) return;
        try {
          const resp = await fetch('../template.php?action=list_types');
          const json = await resp.json();
          if (json.ok && json.types) {
            modalTplType.innerHTML = '';
            json.types.forEach(t => {
              const opt = document.createElement('option');
              opt.value = t.id;
              opt.textContent = t.name;
              modalTplType.appendChild(opt);
            });
            _typesLoaded = true;
          }
        } catch (e) {}
      }

      // 点击发布按钮：打开弹窗
      document.getElementById('publishBtn').addEventListener('click', async () => {
        modalTplName.value = document.getElementById('tmplName').value.trim();
        await loadTypes();
        if (window._currentTypeId) modalTplType.value = window._currentTypeId;
        modal.classList.add('show');
      });

      // 关闭弹窗
      modalCancelBtn.addEventListener('click', () => modal.classList.remove('show'));
      modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('show'); });

      // 收集所有层配置
      function collectLayers() {
        const layers = {};
        document.querySelectorAll('.field-card').forEach(card => {
          const lid = card.dataset.layer;
          if (!lid) return;
          layers[lid] = {
            text:        card.querySelector('.field-input')?.value          ?? null,
            font:        card.querySelector('.field-font')?.value           ?? null,
            size:        card.querySelector('.field-size')?.value           ?? null,
            spacing:     card.querySelector('.field-spacing')?.value        ?? null,
            lineSpacing: card.querySelector('.field-line-spacing')?.value   ?? null,
            x:           card.querySelector('.field-x')?.value              ?? null,
            y:           card.querySelector('.field-y')?.value              ?? null,
            w:           card.querySelector('.field-w')?.value              ?? null,
            h:           card.querySelector('.field-h')?.value              ?? null,
            alignH:      card.querySelector('.field-align-h')?.value        ?? null,
            alignV:      card.querySelector('.field-align-v')?.value        ?? null,
            color:       card.querySelector('.color-row button.active')?.dataset.color ?? null,
            bgColor:     card.querySelector('.bgc-row button.active')?.dataset.bgc    ?? null,
            dir:         card.querySelector('.dir-row button.active')?.dataset.dir    ?? null,
            rotate:      card.querySelector('.field-rotate')?.value         ?? null,
            strokeW:     card.querySelector('.field-stroke-w')?.value       ?? null,
            strokeC:     card.querySelector('.field-stroke-c')?.value       ?? null,
            radius:      card.querySelector('.field-radius')?.value         ?? null,
            dateFmt:     card.querySelector('.field-date-fmt')?.value       ?? null,
            minLen:      card.querySelector('.field-min-len')?.value        ?? null,
            maxLen:      card.querySelector('.field-max-len')?.value        ?? null,
          };
        });
        return layers;
      }

      // 核心保存逻辑，返回 true 表示成功
      async function doSaveConfig(templateId, tplName, typeId, layers, sourceTemplateId) {
        const btn = document.getElementById('publishBtn');
        btn.disabled = true;
        btn.textContent = '合成中…';

        const fd = new FormData();
        fd.append('action', 'save_config');
        fd.append('template_id', templateId);
        fd.append('tpl_name', tplName);
        fd.append('type_id', typeId);
        fd.append('config', JSON.stringify(layers));
        if (sourceTemplateId) fd.append('source_template_id', sourceTemplateId);

        const bgFile = document.getElementById('bgFileInput').files[0];
        if (bgFile) fd.append('bg', bgFile, bgFile.name);

        try {
          const cv = await buildThumbCanvas();
          const thumbBlob = await new Promise(resolve => cv.toBlob(resolve, 'image/png'));
          if (thumbBlob) fd.append('thumb', thumbBlob, 'thumb.png');
        } catch (e) {
          console.warn('合成缩略图失败，将仅保存配置：', e);
        }

        btn.textContent = '发布中…';
        try {
          const resp = await fetch('../template.php', { method: 'POST', body: fd });
          const json = await resp.json();
          if (json.ok) {
            btn.textContent = '✓ 已发布';
            return true;
          } else {
            alert('发布失败：' + (json.error || '未知错误'));
            btn.textContent = '发布';
            btn.disabled = false;
            return false;
          }
        } catch (e) {
          alert('网络错误：' + e.message);
          btn.textContent = '发布';
          btn.disabled = false;
          return false;
        }
      }

      // 确定：保存/更新当前模板
      modalConfirmBtn.addEventListener('click', async () => {
        const tplName = modalTplName.value.trim();
        const typeId  = modalTplType.value;
        if (!tplName) { alert('请填写模板名称'); return; }
        if (!typeId)  { alert('请选择分类'); return; }
        document.getElementById('tmplName').value = tplName;
        modal.classList.remove('show');
        const ok = await doSaveConfig(urlTemplateId, tplName, typeId, collectLayers());
        if (ok) {
          const btn = document.getElementById('publishBtn');
          setTimeout(() => { btn.textContent = '发布'; btn.disabled = false; }, 1500);
        }
      });

      // 另存为：创建新模板后保存，跳转到新页面
      modalSaveAsBtn.addEventListener('click', async () => {
        const tplName = modalTplName.value.trim();
        const typeId  = modalTplType.value;
        if (!tplName) { alert('请填写模板名称'); return; }
        if (!typeId)  { alert('请选择分类'); return; }
        modal.classList.remove('show');

        const btn = document.getElementById('publishBtn');
        btn.disabled = true;
        btn.textContent = '创建中…';
        try {
          const cfd = new FormData();
          cfd.append('action', 'create_template');
          cfd.append('type_id', typeId);
          cfd.append('name', tplName);
          const cResp = await fetch('../template.php', { method: 'POST', body: cfd });
          const cJson = await cResp.json();
          if (!cJson.ok) {
            alert('创建失败：' + (cJson.error || '未知错误'));
            btn.textContent = '发布';
            btn.disabled = false;
            return;
          }
          const newId = cJson.id;
          document.getElementById('tmplName').value = tplName;
          const ok = await doSaveConfig(String(newId), tplName, typeId, collectLayers(), urlTemplateId);
          if (ok) {
            // 跳转时带上 bg 参数，让新页面能直接显示背景图
            const previewSrc = document.getElementById('preview').src;
            let bgParam = '';
            try {
              const previewUrl = new URL(previewSrc);
              // bg 路径形如 template/{id}/bg.xxx，相对于 dl/
              const match = previewUrl.pathname.match(/template\/\d+\/bg\.\w+/);
              if (match) bgParam = '&bg=' + encodeURIComponent(match[0]);
            } catch (e) {}
            setTimeout(() => { location.href = location.pathname + '?template_id=' + newId + bgParam; }, 800);
          }
        } catch (e) {
          alert('网络错误：' + e.message);
          btn.textContent = '发布';
          btn.disabled = false;
        }
      });
    })();

    // 繁体字体列表：这些字体只含繁体字形，输入简体需自动转换
    const TRADITIONAL_FONTS = new Set(['bfs', 'MasaFont-Bold', 'SotyrFangsong-Regular']);

    // 简→繁转换（使用 opencc-js，未加载时原文返回）
    let _s2tConverter = null;
    function s2t(text) {
      if (!text) return text;
      try {
        if (!_s2tConverter && typeof OpenCC !== 'undefined') {
          _s2tConverter = OpenCC.Converter({ from: 'cn', to: 'tw' });
        }
        return _s2tConverter ? _s2tConverter(text) : text;
      } catch (e) {
        return text;
      }
    }

    // 已加载的字体缓存：fontName -> familyName
    const loadedFonts = {};

    // 透传 URL 参数
    const rawQuery = window.location.search || '';
    const urlParamEl = document.getElementById('urlParam');
    if (rawQuery) {
      const text = decodeURIComponent(rawQuery.startsWith('?') ? rawQuery.slice(1) : rawQuery);
      urlParamEl.textContent = text;
      urlParamEl.style.display = 'block';
    } else {
      urlParamEl.style.display = 'none';
    }

    // 从 URL 参数读取背景图并显示
    (function () {
      const params = new URLSearchParams(window.location.search);
      const bg = params.get('bg');
      if (bg) {
        const preview = document.getElementById('preview');
        // create.html 在 template/ 子目录，bg 路径相对于 dl/，需上跳一级
        preview.src = '../' + bg;
      }
    })();

    // 日期格式化工具
    const CN_DIGITS = ['零','一','二','三','四','五','六','七','八','九'];
    function numToCn(n) {
      return String(n).split('').map(c => CN_DIGITS[parseInt(c)]).join('');
    }
    function monthToCn(m) {
      if (m <= 10) return CN_DIGITS[m];
      if (m === 11) return '十一';
      return '十二';
    }
    function dayToCn(d) {
      if (d <= 10) return CN_DIGITS[d];
      if (d < 20) return '十' + CN_DIGITS[d - 10];
      if (d === 20) return '二十';
      if (d < 30) return '二十' + CN_DIGITS[d - 20];
      if (d === 30) return '三十';
      return '三十' + CN_DIGITS[d - 30];
    }
    const TIAN_GAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
    const DI_ZHI   = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    const DZ_MONTH = ['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'];
    function yearToGanZhi(y) {
      return TIAN_GAN[(y - 4) % 10] + DI_ZHI[(y - 4) % 12];
    }
    function monthToGanZhi(m) {
      return DZ_MONTH[m - 1] + '月';
    }
    function formatDate(dateStr, fmt) {
      if (!dateStr) return '';
      const [fy, fm, fd] = dateStr.split('-').map(Number);
      const y2 = fy % 100;
      switch (fmt) {
        case 'cn_full': return numToCn(y2) + '年' + monthToCn(fm) + '月' + dayToCn(fd) + '日';
        case 'cn_ym':   return numToCn(y2) + '·' + monthToCn(fm) + '月';
        case 'gz':      return yearToGanZhi(fy) + '年·' + monthToGanZhi(fm);
        case 'num_full': return y2 + '年' + String(fm).padStart(2,'0') + '月' + String(fd).padStart(2,'0') + '日';
        case 'num_ym':  return y2 + '年' + String(fm).padStart(2,'0') + '月';
        case 'dash_full': return y2 + '·' + String(fm).padStart(2,'0') + '·' + String(fd).padStart(2,'0');
        case 'dash_ym': return y2 + '·' + String(fm).padStart(2,'0');
        default: return dateStr;
      }
    }

    // 默认日期为今天
    const dateInput = document.querySelector('.field-card[data-layer="layer_date"] .field-input');
    if (dateInput) {
      const d = new Date();
      dateInput.value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    // 统一处理每个 field-card
    document.querySelectorAll('.field-card').forEach(card => {
      const layerId = card.dataset.layer;
      const layer = document.getElementById(layerId);
      const input = card.querySelector('.field-input');
      const dateFmtSelect = card.querySelector('.field-date-fmt');
      const fontSelect = card.querySelector('.field-font');
      const sizeInput = card.querySelector('.field-size');
      const spacingInput = card.querySelector('.field-spacing');
      const lineSpacingInput = card.querySelector('.field-line-spacing');
      const xInput = card.querySelector('.field-x');
      const yInput = card.querySelector('.field-y');
      const wInput = card.querySelector('.field-w');
      const hInput = card.querySelector('.field-h');
      const alignHSelect = card.querySelector('.field-align-h');
      const alignVSelect = card.querySelector('.field-align-v');
      const rotateInput = card.querySelector('.field-rotate');
      const strokeWInput = card.querySelector('.field-stroke-w');
      const strokeCInput = card.querySelector('.field-stroke-c');
      const radiusInput = card.querySelector('.field-radius');
      const previewBtn = card.querySelector('.preview-btn');
      const statusEl = card.querySelector('.field-status');
      let currentColor = card.querySelector('.color-row button.active')?.dataset.color || '#111111';
      let currentDir = 'h';

      // 获取显示文本（日期卡片会格式化）
      function getDisplayText() {
        const raw = input.value.trim();
        if (!raw) return '';
        if (dateFmtSelect) return formatDate(raw, dateFmtSelect.value);
        return raw;
      }

      // 日期格式切换时实时更新
      if (dateFmtSelect) {
        dateFmtSelect.addEventListener('change', () => {
          if (layer.style.display !== 'none') {
            layer.textContent = getDisplayText();
          }
        });
      }

      // 将 270x400 坐标转为百分比定位
      function applyPosition() {
        const x = parseInt(xInput.value) || 0;
        const y = parseInt(yInput.value) || 0;
        const w = parseInt(wInput.value) || 100;
        const h = parseInt(hInput.value) || 50;
        layer.style.left = (x / 270 * 100) + '%';
        layer.style.top = (y / 400 * 100) + '%';
        layer.style.width = (w / 270 * 100) + '%';
        layer.style.height = (h / 400 * 100) + '%';
      }

      // xywh 实时更新
      [xInput, yInput, wInput, hInput].forEach(el => {
        el.addEventListener('input', () => {
          if (layer.style.display !== 'none') applyPosition();
        });
      });

      // 对齐方式实时更新
      function applyAlign() {
        layer.style.justifyContent = alignHSelect.value;
        layer.style.alignItems = alignVSelect.value;
        layer.style.textAlign = alignHSelect.value === 'flex-start' ? 'left' : alignHSelect.value === 'flex-end' ? 'right' : 'center';
      }
      alignHSelect.addEventListener('change', () => {
        if (layer.style.display !== 'none') applyAlign();
      });
      alignVSelect.addEventListener('change', () => {
        if (layer.style.display !== 'none') applyAlign();
      });

      // 横排/竖排切换
      card.querySelectorAll('.dir-row button').forEach(btn => {
        btn.addEventListener('click', () => {
          card.querySelectorAll('.dir-row button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentDir = btn.dataset.dir;
          if (layer.style.display !== 'none') {
            layer.style.writingMode = currentDir === 'v' ? 'vertical-lr' : 'horizontal-tb';
          }
        });
      });

      // 颜色切换
      card.querySelectorAll('.color-row button').forEach(btn => {
        btn.addEventListener('click', () => {
          card.querySelectorAll('.color-row button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentColor = btn.dataset.color;
          layer.style.color = currentColor;
        });
      });

      // 背景颜色切换
      card.querySelectorAll('.bgc-row button').forEach(btn => {
        btn.addEventListener('click', () => {
          card.querySelectorAll('.bgc-row button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          layer.style.backgroundColor = btn.dataset.bgc;
        });
      });

      // 字号实时更新
      sizeInput.addEventListener('input', () => {
        if (layer.style.display !== 'none') {
          layer.style.fontSize = (parseInt(sizeInput.value) || 28) + 'px';
        }
      });

      // 字间距实时更新
      spacingInput.addEventListener('input', () => {
        if (layer.style.display !== 'none') {
          layer.style.letterSpacing = (parseInt(spacingInput.value) || 0) + 'px';
        }
      });

      // 行间距实时更新
      lineSpacingInput.addEventListener('input', () => {
        if (layer.style.display !== 'none') {
          layer.style.lineHeight = parseFloat(lineSpacingInput.value) || 1.3;
        }
      });

      // 旋转角度实时更新
      rotateInput.addEventListener('input', () => {
        if (layer.style.display !== 'none') {
          layer.style.transform = `rotate(${parseInt(rotateInput.value) || 0}deg)`;
        }
      });

      // 描边实时更新
      function applyStroke() {
        const sw = parseFloat(strokeWInput.value) || 0;
        const sc = strokeCInput.value;
        layer.style.webkitTextStroke = sw > 0 ? `${sw}px ${sc}` : '';
      }
      strokeWInput.addEventListener('input', () => {
        if (layer.style.display !== 'none') applyStroke();
      });
      strokeCInput.addEventListener('input', () => {
        if (layer.style.display !== 'none') applyStroke();
      });

      // 圆角实时更新
      radiusInput.addEventListener('input', () => {
        if (layer.style.display !== 'none') {
          layer.style.borderRadius = (parseInt(radiusInput.value) || 0) + 'px';
        }
      });

      // 应用文字到图层（overrideText：繁体字体传入转换后文本）
      function applyText(family, overrideText) {
        const text = overrideText !== undefined ? overrideText : getDisplayText();
        if (!text) {
          layer.style.display = 'none';
          return;
        }
        layer.style.display = 'flex';
        layer.textContent = text;
        layer.style.fontFamily = family;
        layer.style.fontSize = (parseInt(sizeInput.value) || 28) + 'px';
        layer.style.color = currentColor;
        layer.style.letterSpacing = (parseInt(spacingInput.value) || 0) + 'px';
        layer.style.lineHeight = parseFloat(lineSpacingInput.value) || 1.3;
        layer.style.writingMode = currentDir === 'v' ? 'vertical-lr' : 'horizontal-tb';
        applyPosition();
        applyAlign();
        layer.style.transform = `rotate(${parseInt(rotateInput.value) || 0}deg)`;
        applyStroke();
      }

      // 预览按钮
      previewBtn.addEventListener('click', async () => {
        const text = getDisplayText();
        if (!text) {
          statusEl.textContent = '请填写内容';
          statusEl.style.color = '#f85149';
          return;
        }
        statusEl.textContent = '';
        document.activeElement?.blur();

        const fontName = fontSelect.value;

        if (fontName === 'default') {
          applyText('sans-serif');
          return;
        }

        // 繁体字体：将输入的简体文字转换为繁体，再请求子集和渲染
        const isTraditional = TRADITIONAL_FONTS.has(fontName);
        const displayText = isTraditional ? s2t(text) : text;

        // 检查缓存（按字体名 + 渲染用文字内容，子集不同不能复用）
        const cacheKey = fontName + '|' + displayText;
        if (loadedFonts[cacheKey]) {
          applyText(loadedFonts[cacheKey], isTraditional ? displayText : undefined);
          return;
        }

        // 远程加载
        previewBtn.disabled = true;
        previewBtn.classList.add('btn-loading');
        loadingOverlay.classList.add('show');

        try {
          const uniqueChars = [...new Set(displayText.replace(/\s/g, ''))].join('');
          const url = `${FONT_API}?font=${encodeURIComponent(fontName)}&text=${encodeURIComponent(uniqueChars)}`;
          const resp = await fetch(url);
          if (!resp.ok) throw new Error('字体加载失败: ' + resp.status);

          const data = await resp.arrayBuffer();
          // 每次文字不同用不同 family 名，避免旧 FontFace 覆盖问题
          const familyKey = `CustomFont_${fontName}_${[...new Set(displayText)].sort().join('').slice(0,16)}`;
          const face = new FontFace(familyKey, data, { style: 'normal', weight: 'normal' });
          await face.load();
          document.fonts.add(face);
          loadedFonts[cacheKey] = familyKey;

          applyText(familyKey, isTraditional ? displayText : undefined);
        } catch (err) {
          console.error(err);
          statusEl.textContent = '✖ ' + err.message;
          statusEl.style.color = '#f85149';
        } finally {
          previewBtn.disabled = false;
          previewBtn.classList.remove('btn-loading');
          loadingOverlay.classList.remove('show');
        }
      });
    });

    // ── 恢复已保存的配置 ──────────────────────────────────────────
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const templateId = params.get('template_id');
      if (!templateId) return;

      let cfg, tplName;
      try {
        const resp = await fetch('../template.php?action=get_config&template_id=' + encodeURIComponent(templateId));
        const json = await resp.json();
        if (!json.ok || !json.config) return;
        cfg = JSON.parse(json.config);
        tplName = json.tpl_name || '';
        window._currentTypeId = json.type_id || 0;
      } catch (e) { return; }

      // 模板名称
      const nameEl = document.getElementById('tmplName');
      if (nameEl && tplName) nameEl.value = tplName;

      // 每个 field-card
      document.querySelectorAll('.field-card').forEach(card => {
        const lid = card.dataset.layer;
        const s = cfg[lid];
        if (!s) return;

        function setVal(sel, val) {
          if (val == null) return;
          const el = card.querySelector(sel);
          if (el) el.value = val;
        }
        function clickBtnByAttr(sel, attr, val) {
          if (val == null) return;
          const btn = card.querySelector(sel + '[' + attr + '="' + val + '"]');
          if (btn) btn.click();
        }

        setVal('.field-font',         s.font);
        setVal('.field-size',         s.size);
        setVal('.field-spacing',      s.spacing);
        setVal('.field-line-spacing', s.lineSpacing);
        setVal('.field-x',            s.x);
        setVal('.field-y',            s.y);
        setVal('.field-w',            s.w);
        setVal('.field-h',            s.h);
        setVal('.field-align-h',      s.alignH);
        setVal('.field-align-v',      s.alignV);
        setVal('.field-rotate',       s.rotate);
        setVal('.field-stroke-w',     s.strokeW);
        setVal('.field-stroke-c',     s.strokeC);
        setVal('.field-radius',       s.radius);
        setVal('.field-date-fmt',     s.dateFmt);
        setVal('.field-min-len',      s.minLen);
        setVal('.field-max-len',      s.maxLen);
        // 输入文字
        if (s.text != null) {
          const inputEl = card.querySelector('.field-input');
          if (inputEl) inputEl.value = s.text;
        }

        // 按钮组：通过 click 事件同步闭包内的状态变量
        clickBtnByAttr('.color-row button', 'data-color', s.color);
        clickBtnByAttr('.bgc-row button',   'data-bgc',   s.bgColor);
        clickBtnByAttr('.dir-row button',   'data-dir',   s.dir);

        // borderRadius 由 input 事件设置但需 layer 可见才生效，直接补一次
        if (s.radius != null) {
          const layer = document.getElementById(lid);
          if (layer) layer.style.borderRadius = (parseInt(s.radius) || 0) + 'px';
        }
      });
    })();
  </script>
</body>
